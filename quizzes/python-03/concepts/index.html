<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME = "Python Class 3 \u2014 Conceptual";

const sections = [
  { title: "Section 1: NumPy Fundamentals", range: [0, 5] },
  { title: "Section 2: NumPy Operations", range: [5, 10] },
  { title: "Section 3: Pandas Basics", range: [10, 15] },
  { title: "Section 4: Pandas Selection & Cleaning", range: [15, 20] },
  { title: "Section 5: Aggregation & Best Practices", range: [20, 25] }
];

const questions = [
  {
    q: "Why is NumPy faster than plain Python lists for numerical computation?",
    opts: [
      "NumPy uses a special compiler that translates Python math into faster machine code before running it",
      "NumPy arrays use one fixed data type for all elements AND store them side by side in memory, so the computer skips per-element type checking and processes numbers in bulk",
      "NumPy compresses numbers into fewer bytes so they take less space and are quicker to read from disk",
      "NumPy bypasses Python entirely and sends all math operations directly to the GPU hardware for parallel processing"
    ],
    ans: 1,
    explanation: "Two things make Python lists slow for math. First, each element can be a different type (int, string, list...), so for every operation Python must check: \"what type is this? how do I do math with it?\" — this type checking happens for every single element. Second, list elements are scattered across memory as separate Python objects, so the CPU has to chase pointers to find each one. NumPy solves both problems: (1) a fixed dtype (e.g., float64) means zero type checking per element, and (2) contiguous storage means all numbers sit side by side in one block of memory, letting the CPU process them in bulk using optimized C code. Both factors together make NumPy 10-100x faster."
  },
  {
    q: "You create an array from integers: 'np.array([1, 2, 3])'. You then try to assign 'arr[0] = 3.7'. What value does arr[0] hold afterwards?",
    opts: [
      "3.7 — NumPy automatically converts the array to float to accommodate the decimal value",
      "3 — the array's dtype is int64, so 3.7 is silently truncated to 3 (no error, no warning)",
      "Error — you can't assign a float to an integer array; Python raises a TypeError",
      "4 — NumPy rounds 3.7 to the nearest integer when the array dtype is int64"
    ],
    ans: 1,
    explanation: "Every NumPy array has a fixed dtype set at creation. np.array([1, 2, 3]) is int64 because all inputs are integers. When you assign 3.7 to an int64 array, NumPy silently truncates it to 3 — no error, no rounding, no warning. This is a common source of subtle bugs: you think you stored 3.7 but you actually stored 3. To avoid this, create the array as float from the start: np.array([1.0, 2.0, 3.0]) or np.array([1, 2, 3], dtype=float)."
  },
  {
    q: "What do 'shape' and 'ndim' tell you about a NumPy array?",
    opts: [
      "shape gives the data type; ndim gives the number of elements",
      "shape is a tuple of dimension sizes (rows, cols, ...); ndim is the number of dimensions",
      "shape is the total memory used; ndim is the number of unique values",
      "They both return the length of the array"
    ],
    ans: 1,
    explanation: "For a 2D array with 3 rows and 4 columns: shape = (3, 4) and ndim = 2. The shape tuple has ndim entries."
  },
  {
    q: "A student slices a NumPy array with 'b = a[1:4]' and then modifies 'b[0] = 999'. They're surprised that 'a[1]' is also 999. Why did this happen?",
    opts: [
      "It's a Python bug — slicing should always create an independent copy of the data",
      "NumPy slicing returns a view (not a copy) that shares memory with the original — modifying the view changes the original array too",
      "The = operator on arrays always creates a reference, and you need .slice() to get a proper independent copy",
      "This only happens with integer arrays; float arrays would behave differently and create a true copy"
    ],
    ans: 1,
    explanation: "In NumPy, basic slicing (a[1:4]) returns a VIEW — a window into the same underlying memory, not a copy. This is intentional for performance: copying millions of elements every time you slice would be wasteful. But it means changes to the view affect the original. If you need an independent copy, use b = a[1:4].copy(). This view-vs-copy behavior is one of the most important things to understand in NumPy, and it's different from Python lists where slicing always copies."
  },
  {
    q: "What happens when you create a NumPy array from a list that mixes integers and floats?",
    opts: [
      "Python raises a TypeError because all elements in a NumPy array must be created with the same type",
      "NumPy upcasts all elements to the most general type — float64 in this case, so integers silently become floats",
      "NumPy keeps each element as its original type, storing int and float side by side in the same array",
      "The integers are truncated to zero decimal places and then stored as string representations"
    ],
    ans: 1,
    explanation: "NumPy arrays have a single dtype, so when you mix int and float, NumPy upcasts everything to the more general type. Example: 'np.array([1, 2.5, 3])' becomes 'array([1.0, 2.5, 3.0])' with dtype float64. The integer 1 becomes 1.0 because float can represent both integers and decimals, but int can't represent 2.5. This is called type promotion."
  },
  {
    q: "What is a 'vectorized operation' in NumPy?",
    opts: [
      "An operation that only works on vectors (1D arrays)",
      "An operation that applies to every element simultaneously without writing a Python loop",
      "An operation that converts arrays to lists",
      "An operation that sorts the array in-place"
    ],
    ans: 1,
    explanation: "arr * 2 doubles every element, arr > 5 creates a boolean mask. NumPy executes optimized C code — always prefer vectorized ops over Python for-loops."
  },
  {
    q: "What is broadcasting in NumPy?",
    opts: [
      "Sending array data over the network to multiple machines for distributed computing",
      "A set of rules that let you perform operations between arrays of different shapes — for example, adding a single row to every row of a matrix without writing a loop",
      "A method that converts a NumPy array into a pandas DataFrame for tabular analysis",
      "A function that prints the full contents of large arrays to the console instead of truncating them"
    ],
    ans: 1,
    explanation: "Broadcasting is about combining arrays of different shapes. Example: 'np.array([[1, 2], [3, 4]]) + np.array([10, 20])' gives '[[11, 22], [13, 24]]' — the 1D array [10, 20] is 'broadcast' to each row of the 2D matrix. Without broadcasting, you'd need a loop to add [10, 20] to every row manually. The key rule: dimensions are compared from right to left, and they must either match or one of them must be 1. Note: 'arr + 5' is element-wise addition with a scalar, which is even simpler than broadcasting."
  },
  {
    q: "You compute 'arr.sum(axis=0)' on a 2D array with shape (3, 4). What shape is the result, and what did axis=0 do?",
    opts: [
      "Shape (3, 4) — axis=0 does nothing, the array is returned unchanged",
      "Shape (4,) — axis=0 collapses the rows, summing down each column to produce one value per column",
      "Shape (3,) — axis=0 collapses the columns, summing across each row to produce one value per row",
      "Shape () — a single scalar that is the total sum of all 12 elements regardless of the axis"
    ],
    ans: 1,
    explanation: "The axis parameter specifies WHICH dimension to collapse. axis=0 means \"collapse along dimension 0 (rows)\" — so for a (3, 4) array, you sum the 3 values in each column, producing 4 results: shape (4,). axis=1 would collapse columns instead, summing across each row to get shape (3,). No axis at all returns a single scalar (sum of everything). The trick to remember: the axis you specify is the one that DISAPPEARS from the result shape."
  },
  {
    q: "How does boolean indexing work in NumPy?",
    opts: [
      "You pass True or False as an index to get the first or last element",
      "You create a boolean mask (array of True/False) and use it to select elements where the mask is True",
      "You convert boolean values to 0 and 1 and use them as indices",
      "Boolean indexing is only available in pandas, not NumPy"
    ],
    ans: 1,
    explanation: "arr[arr > 5] creates a boolean mask then returns only elements where True. Combine conditions with & (and), | (or), ~ (not)."
  },
  {
    q: "What does .reshape() do, and what constraint must be satisfied?",
    opts: [
      "It changes the data type of the array; the new type must be compatible",
      "It changes the shape of the array without changing the data; the total number of elements must stay the same",
      "It sorts the array into a new shape; all elements must be numeric",
      "It adds or removes elements to match the new shape"
    ],
    ans: 1,
    explanation: "reshape() rearranges dimensions. A (6,) array can become (2,3) or (3,2) but not (2,4) because 2*4≠6. Use -1 for one dimension to let NumPy calculate it."
  },
  {
    q: "What is the difference between a pandas Series and a DataFrame?",
    opts: [
      "A Series is 1D (like a single column); a DataFrame is 2D (like a table with rows and columns)",
      "A Series can only hold numbers; a DataFrame can hold any type",
      "A DataFrame is faster than a Series",
      "They are the same thing with different names"
    ],
    ans: 0,
    explanation: "A Series is a single column with an index. A DataFrame is a collection of Series sharing the same index — like a spreadsheet or SQL table."
  },
  {
    q: "You filter a DataFrame with 'df[df['age'] > 30]' and the result has index values [2, 5, 8] instead of [0, 1, 2]. Why, and does it matter?",
    opts: [
      "It's a pandas bug — filtered DataFrames should always reset their index to start from 0",
      "Pandas preserves the original row labels after filtering — the rows keep their original index, which is useful for tracking back to the source data",
      "The numbers [2, 5, 8] are the age values, not the indices — pandas confuses columns and indices after filtering",
      "This only happens if the DataFrame was loaded from a CSV file; programmatically created DataFrames always reset"
    ],
    ans: 1,
    explanation: "When you filter a DataFrame, pandas keeps the original index values — they don't get renumbered. This is actually useful: the indices tell you which rows from the original data passed the filter (rows 2, 5, and 8). If you need a clean 0, 1, 2 index, call .reset_index(drop=True) on the result. This behavior catches beginners off guard when they try to access the filtered result by position (iloc vs loc), since iloc[0] gives you the first filtered row, but loc[0] might not exist."
  },
  {
    q: "How do you create a DataFrame from a Python dictionary?",
    opts: [
      "pd.DataFrame(dict) — keys become column names, values (lists) become columns",
      "pd.Series(dict) — keys become row labels",
      "pd.read_dict(dict) — a special reader for dictionaries",
      "You can't create DataFrames from dictionaries directly"
    ],
    ans: 0,
    explanation: "pd.DataFrame({'name': ['Alice', 'Bob'], 'age': [25, 30]}) creates a 2-column DataFrame. This is the most common way."
  },
  {
    q: "What do df.head(), df.info(), and df.describe() show you?",
    opts: [
      "They all show the same summary information but formatted differently for various output contexts",
      "head() shows the first few rows; info() shows column types and null counts; describe() shows statistical summaries",
      "head() shows only column names and types; info() shows data types in detail; describe() shows the row index",
      "They are three different methods for exporting the DataFrame to CSV, JSON, and Excel respectively"
    ],
    ans: 1,
    explanation: "These are your go-to EDA (Exploratory Data Analysis) functions — the first things you run when you open a new dataset. head(n) shows the first n rows so you can see what the data looks like. info() shows each column's name, non-null count, and dtype — great for spotting missing data and wrong types. describe() gives count, mean, std, min, max, and quartiles for numeric columns."
  },
  {
    q: "What is the difference between df.shape and len(df)?",
    opts: [
      "They return the same thing — the number of rows",
      "df.shape returns (rows, columns) as a tuple; len(df) returns just the number of rows",
      "len(df) returns the number of columns; df.shape returns the number of rows",
      "df.shape is a method; len(df) is a property"
    ],
    ans: 1,
    explanation: "df.shape returns (100, 5) meaning 100 rows and 5 columns. len(df) returns just 100."
  },
  {
    q: "What is the difference between .loc[] and .iloc[]?",
    opts: [
      ".loc uses label-based indexing (row/column names); .iloc uses integer-based positional indexing",
      ".loc is for rows; .iloc is for columns",
      ".loc is faster; .iloc is slower but more flexible",
      "They are identical"
    ],
    ans: 0,
    explanation: "df.loc['row_label', 'col_name'] selects by label. df.iloc[0, 2] selects by position. Key difference: .loc includes the endpoint in slicing, .iloc excludes it."
  },
  {
    q: "How do you filter rows in a DataFrame based on a condition?",
    opts: [
      "df.filter(condition) — like SQL WHERE",
      "df[boolean_mask] — pass a Series of True/False values to select matching rows",
      "df.select(condition) — a pandas method",
      "You must use a for loop to check each row"
    ],
    ans: 1,
    explanation: "df[df['age'] > 30] creates a True/False mask and returns matching rows. Combine with & (and), | (or). Parentheses around each condition are required."
  },
  {
    q: "What does df.isna() return?",
    opts: [
      "The count of missing values per column",
      "A DataFrame of the same shape with True where values are missing (NaN) and False elsewhere",
      "A list of column names that contain missing values",
      "It removes all missing values from the DataFrame"
    ],
    ans: 1,
    explanation: "isna() returns a boolean DataFrame. Chain it: df.isna().sum() for counts, df.isna().mean() * 100 for percentages."
  },
  {
    q: "What is the difference between .fillna() and .dropna()?",
    opts: [
      "fillna() replaces missing values with a specified value; dropna() removes rows (or columns) that contain missing values",
      "fillna() is for numeric columns; dropna() is for string columns",
      "dropna() replaces NaN with 0; fillna() removes NaN rows",
      "They do the same thing but fillna() is faster"
    ],
    ans: 0,
    explanation: "fillna(value) substitutes NaN. dropna() removes rows/columns with NaN. Drop if they're few; fill if you can estimate what's missing."
  },
  {
    q: "What does .astype() do in pandas?",
    opts: [
      "It renames columns to match the specified type names",
      "It converts a column's data type — for example, from object (string) to int or float",
      "It creates a new column with the specified type",
      "It checks whether a column's type matches the expected type"
    ],
    ans: 1,

let currentQ=0,answers=new Array(questions.length).fill(null),userName="",userGithub="";
function startQuiz(){userName=document.getElementById("userName").value.trim();userGithub=document.getElementById("userGithub").value.trim();if(!userName){alert("Please enter your name.");return;}document.getElementById("startScreen").classList.add("hidden");document.getElementById("quizScreen").classList.remove("hidden");quizActive=true;renderQuestion();}
let quizActive=false;
document.getElementById("userName").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("userGithub").focus();}});
document.getElementById("userGithub").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();startQuiz();}});
document.addEventListener("keydown",function(e){if(!quizActive)return;if(e.key==="Enter"&&answers[currentQ]!==null){e.preventDefault();if(currentQ===questions.length-1)submitQuiz();else nextQuestion();}});
function getSection(idx){for(const s of sections){if(idx>=s.range[0]&&idx<s.range[1])return s.title;}return"";}
function renderQuestion(){const q=questions[currentQ],letters=["A","B","C","D"],card=document.getElementById("questionCard");let html=`<div class="section-badge">${getSection(currentQ)}</div><h2>Q${currentQ+1}. ${q.q}</h2><div class="options">`;q.opts.forEach((opt,i)=>{const sel=answers[currentQ]===i?" selected":"";html+=`<div class="option${sel}" onclick="selectOption(${i})"><span class="letter">${letters[i]}</span><span class="text">${opt}</span></div>`;});html+=`</div>`;card.innerHTML=html;const nav=document.getElementById("qNav");let navHtml="";for(let n=0;n<questions.length;n++){let cls="q-nav-btn";if(n===currentQ)cls+=" active";else if(answers[n]!==null)cls+=" answered";navHtml+=`<button class="${cls}" onclick="jumpTo(${n})">${n+1}</button>`;}nav.innerHTML=navHtml;document.getElementById("progressLabel").textContent=`Question ${currentQ+1} of ${questions.length}`;document.getElementById("sectionLabel").textContent=getSection(currentQ);document.getElementById("progressFill").style.width=((currentQ+1)/questions.length*100)+"%";document.getElementById("prevBtn").style.visibility=currentQ===0?"hidden":"visible";const nextBtn=document.getElementById("nextBtn");if(currentQ===questions.length-1){nextBtn.textContent="Submit Quiz";nextBtn.onclick=submitQuiz;}else{nextBtn.textContent="Next";nextBtn.onclick=nextQuestion;}}
function selectOption(idx){answers[currentQ]=idx;renderQuestion();}
function jumpTo(idx){currentQ=idx;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}
function nextQuestion(){if(answers[currentQ]===null){alert("Please select an answer before continuing.");return;}if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function submitQuiz(){if(answers[currentQ]===null){alert("Please select an answer before submitting.");return;}const unanswered=answers.findIndex(a=>a===null);if(unanswered!==-1){alert(`Please answer Question ${unanswered+1} before submitting.`);currentQ=unanswered;renderQuestion();return;}if(!confirm("Submit your quiz? You won't be able to change answers."))return;quizActive=false;const results=questions.map((q,i)=>answers[i]===q.ans);const score=results.filter(Boolean).length;sendResults(results,score);showResults(results,score);}
function sendResults(results,score){if(SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){console.warn("No Apps Script URL configured.");return;}fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({quizName:QUIZ_NAME,name:userName,github:userGithub,results:results})}).catch(err=>console.error("Failed:",err));}
function showResults(results,score){document.getElementById("quizScreen").classList.add("hidden");const container=document.getElementById("resultsScreen");container.classList.remove("hidden");const pct=Math.round((score/questions.length)*100),tier=pct>=80?"high":pct>=50?"mid":"low";const message=pct>=80?"Excellent work!":pct>=50?"Good effort \u2014 review the topics you missed.":"Keep studying \u2014 review the explanations below.";let html=`<div class="score-circle score-${tier}"><span class="number">${score}/${questions.length}</span><span class="label">${pct}%</span></div><h1>${message}</h1><p class="results-subtitle">${userName}${userGithub?" &bull; @"+userGithub:""}</p><div class="review-list">`;const letters=["A","B","C","D"];questions.forEach((q,i)=>{const correct=results[i];const cls=correct?"correct":"incorrect";const status=correct?"\u2713 Correct":"\u2717 Incorrect";html+=`<div class="review-item ${cls}"><div class="q-title">Q${i+1}. ${q.q}</div><div class="status-badge ${cls}">${status}</div><div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} \u2014 ${q.opts[answers[i]]}</div>`;if(!correct)html+=`<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} \u2014 ${q.opts[q.ans]}</div>`;html+=`<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div></div>`;});html+=`</div>`;container.innerHTML=html;window.scrollTo({top:0,behavior:"smooth"});}
</script>
