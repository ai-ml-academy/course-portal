<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Python Fundamentals: Code Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
<style>
/* ── Theme: Warm Emerald ── */
:root {
  --pri-900: #134E3A;
  --pri-800: #1A6B4F;
  --pri-700: #218764;
  --pri-600: #28A37A;
  --pri-500: #34C090;
  --pri-400: #5CD4A8;
  --pri-300: #8AE4C2;
  --pri-200: #B5EEDB;
  --pri-100: #D9F7EC;
  --pri-50:  #EDFBF5;
  --slate-50:  #F7F8FA;
  --slate-100: #EDEEF2;
  --slate-200: #D5D7DE;
  --slate-500: #6B7280;
  --slate-700: #374151;
  --slate-900: #111827;
  --success: #059669;
  --success-bg: #ECFDF5;
  --error: #DC2626;
  --error-bg: #FEF2F2;
  --accent: #F59E0B;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius-md: 10px;
  --radius-lg: 16px;
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.14);
  --ease: cubic-bezier(.4, 0, .2, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--slate-50);
  min-height: 100vh;
  color: var(--slate-900);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 2rem;
}
.quiz-container { width: 100%; max-width: 800px; margin: 0 auto; }
.start-screen {
  background: white; border-radius: var(--radius-lg); padding: 3rem;
  box-shadow: var(--shadow-md); border: 1px solid var(--slate-200); text-align: center;
}
.start-screen h1 { font-size: 1.8rem; font-weight: 800; color: var(--pri-800); margin-bottom: 0.5rem; }
.start-screen .subtitle { color: var(--slate-500); font-size: 1rem; margin-bottom: 2rem; }
.start-screen input {
  display: block; width: 100%; max-width: 400px; margin: 0.75rem auto;
  padding: 0.85rem 1rem; border: 2px solid var(--slate-200); border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 1rem; transition: border-color 0.2s var(--ease);
}
.start-screen input:focus { outline: none; border-color: var(--pri-500); }
.start-screen .info { color: var(--slate-500); font-size: 0.85rem; margin-top: 0.5rem; margin-bottom: 1.5rem; }
.btn {
  display: inline-block; padding: 0.85rem 2.5rem; border: none; border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s var(--ease);
}
.btn-primary { background: var(--pri-700); color: white; }
.btn-primary:hover { background: var(--pri-600); transform: translateY(-1px); }
.btn-primary:disabled { background: var(--slate-200); color: var(--slate-500); cursor: not-allowed; transform: none; }
.btn-secondary { background: var(--slate-100); color: var(--slate-700); }
.btn-secondary:hover { background: var(--slate-200); }
.progress-bar { background: var(--slate-200); border-radius: 20px; height: 8px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--pri-500); border-radius: 20px; transition: width 0.4s var(--ease); }
.progress-text { color: var(--slate-500); font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
.question-card {
  background: white; border-radius: var(--radius-lg); padding: 2.5rem;
  box-shadow: var(--shadow-md); border: 1px solid var(--slate-200); animation: slideIn 0.3s var(--ease);
}
@keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.section-badge {
  display: inline-block; background: var(--pri-50); color: var(--pri-700);
  font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.8rem; border-radius: 20px;
  margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.03em;
}
.question-card h2 { font-size: 1.2rem; font-weight: 700; color: var(--slate-900); line-height: 1.5; margin-bottom: 1.5rem; }
.question-card h2 code, .review-item code {
  background: #1e293b !important; color: #e2e8f0; padding: 0.8rem 1rem; border-radius: 8px;
  display: block; margin-top: 0.75rem; font-size: 0.9rem !important; line-height: 1.7 !important;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace !important; white-space: pre-wrap !important; text-align: left; font-weight: 400;
}
code[class*="language-"], pre[class*="language-"] {
  background: #1e293b !important; text-shadow: none !important;
}
.token.comment, .token.prolog { color: #6b7280; }
.token.keyword { color: #c792ea; }
.token.string { color: #c3e88d; }
.token.function { color: #82aaff; }
.token.number { color: #f78c6c; }
.token.operator { color: #89ddff; }
.token.builtin { color: #ffcb6b; }
.token.boolean { color: #f78c6c; }
.token.punctuation { color: #89ddff; }
.options { display: flex; flex-direction: column; gap: 0.75rem; }
.option {
  display: flex; align-items: flex-start; gap: 0.85rem; padding: 1rem 1.2rem;
  border: 2px solid var(--slate-200); border-radius: var(--radius-md);
  cursor: pointer; transition: all 0.15s var(--ease); line-height: 1.5;
}
.option:hover { border-color: var(--pri-300); background: var(--pri-50); }
.option.selected { border-color: var(--pri-500); background: var(--pri-50); }
.option .letter {
  flex-shrink: 0; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: var(--slate-100); color: var(--slate-700); font-weight: 600; font-size: 0.85rem; margin-top: 1px;
}
.option.selected .letter { background: var(--pri-600); color: white; }
.option .text { font-size: 1rem; color: var(--slate-700); }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
.results-screen {
  background: white; border-radius: var(--radius-lg); padding: 3rem;
  box-shadow: var(--shadow-md); border: 1px solid var(--slate-200); animation: slideIn 0.3s var(--ease);
}
.score-circle {
  width: 160px; height: 160px; border-radius: 50%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-weight: 800;
}
.score-circle .number { font-size: 2.8rem; line-height: 1; }
.score-circle .label { font-size: 0.85rem; font-weight: 500; margin-top: 0.25rem; }
.score-high { background: var(--success-bg); color: var(--success); border: 3px solid var(--success); }
.score-mid { background: #FFF8E7; color: #B8860B; border: 3px solid #C49545; }
.score-low { background: var(--error-bg); color: var(--error); border: 3px solid var(--error); }
.results-screen h1 { text-align: center; font-size: 1.5rem; color: var(--pri-800); margin-bottom: 0.5rem; }
.results-screen .results-subtitle {
  text-align: center; color: var(--slate-500); margin-top: 0.75rem; margin-bottom: 3rem;
  padding-bottom: 2rem; border-bottom: 1px solid var(--slate-200);
}
.review-list { display: flex; flex-direction: column; gap: 1rem; }
.review-item { padding: 1.2rem; border-radius: var(--radius-md); border-left: 4px solid; }
.review-item.correct { background: var(--success-bg); border-color: var(--success); }
.review-item.incorrect { background: var(--error-bg); border-color: var(--error); }
.review-item .q-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--slate-900); }
.review-item .status-badge { display: inline-block; font-size: 0.8rem; font-weight: 700; padding: 0.2rem 0.7rem; border-radius: 20px; margin-bottom: 0.5rem; }
.review-item .status-badge.correct { background: var(--success); color: white; }
.review-item .status-badge.incorrect { background: var(--error); color: white; }
.review-item .your-answer { font-size: 0.9rem; color: var(--slate-700); margin-bottom: 0.25rem; }
.review-item .correct-answer { font-size: 0.9rem; color: var(--success); font-weight: 500; margin-top: 0.25rem; }
.review-item .explanation { font-size: 0.85rem; color: var(--slate-500); margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(0,0,0,0.08); }
.q-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; justify-content: center; }
.q-nav-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--slate-200); background: white;
  color: var(--slate-500); font-family: var(--font-body); font-size: 0.75rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s var(--ease); display: flex; align-items: center; justify-content: center;
}
.q-nav-btn:hover { border-color: var(--pri-400); color: var(--pri-700); }
.q-nav-btn.active { background: var(--pri-700); color: white; border-color: var(--pri-700); font-weight: 700; }
.q-nav-btn.answered { background: var(--pri-100); border-color: var(--pri-400); color: var(--pri-800); }
.q-nav-btn.answered.active { background: var(--pri-700); color: white; border-color: var(--pri-700); }
.hidden { display: none; }
.submitting-msg { text-align: center; color: var(--slate-500); font-size: 0.9rem; margin-top: 1rem; }
@media (max-width: 600px) {
  body { padding: 0.75rem; }
  .question-card, .start-screen, .results-screen { padding: 1.25rem; }
  .question-card h2 { font-size: 1rem; }
  .option { padding: 0.75rem 1rem; gap: 0.6rem; }
  .option .text { font-size: 0.9rem; }
  .option .letter { width: 24px; height: 24px; font-size: 0.75rem; }
  .q-nav { gap: 4px; }
  .q-nav-btn { width: 28px; height: 28px; font-size: 0.7rem; }
  .nav-row { margin-top: 1rem; }
  .btn { padding: 0.75rem 1.5rem; font-size: 0.9rem; }
  .start-screen h1 { font-size: 1.4rem; }
  .start-screen input { padding: 0.7rem 0.85rem; font-size: 0.9rem; }
  .review-item { padding: 1rem; }
  .review-item .q-title { font-size: 0.9rem; }
  .score-circle { width: 130px; height: 130px; }
  .score-circle .number { font-size: 2.2rem; }
}
</style>
</head>
<body>

<div class="quiz-container">
  <div id="startScreen" class="start-screen">
    <h1>Quiz &mdash; Python Fundamentals: Code Reading</h1>
    <p class="subtitle">Data Structures, Control Flow &amp; Functions &mdash; 20 Questions</p>
    <input type="text" id="userName" placeholder="Your Full Name" required>
    <input type="text" id="userGithub" placeholder="GitHub Username — optional">
    <p class="info">4 sections &bull; ~12 minutes &bull; Results shown after submission</p>
    <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quizScreen" class="hidden">
    <div class="q-nav" id="qNav"></div>
    <div class="progress-text">
      <span id="progressLabel">Question 1 of 20</span>
      <span id="sectionLabel">Section 1</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 5%"></div>
    </div>
    <div class="question-card" id="questionCard"></div>
    <div class="nav-row">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Back</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
    </div>
  </div>

  <div id="resultsScreen" class="results-screen hidden"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME = "Python Class 1 \u2014 Code Reading";

const sections = [
  { title: "Section 1: Lists & Data Structures", range: [0, 5] },
  { title: "Section 2: Dictionaries & Sets", range: [5, 10] },
  { title: "Section 3: Conditionals & Loops", range: [10, 15] },
  { title: "Section 4: Functions & File I/O", range: [15, 20] }
];

const questions = [
  {
    q: "What does this code print?<br><br><code>a = [1, 2, 3]\nb = a\nb.append(99)\nprint(a, len(a))</code>",
    opts: [
      "[1, 2, 3] 3 — b is a separate copy, so a stays the same",
      "[1, 2, 3, 99] 4 — both variables share the same list",
      "[99] 1 — b = a replaces a's contents entirely",
      "Error — append doesn't work on aliased references"
    ],
    ans: 1,
    explanation: "This tests one of the most important gotchas in Python: 'b = a' does NOT copy the list. Both variables now reference the exact same list object in memory. When you call b.append(99), you're modifying that shared list, so a sees the change too. This is called aliasing and it's a frequent source of bugs. If you want an independent copy, use 'b = a.copy()' or 'b = a[:]' — then modifying b won't affect a."
  },
  {
    q: "What does this code print?<br><br><code>data = [10, 20, 30]\ndata.append([40, 50])\nprint(len(data), data[-1])</code>",
    opts: [
      "5 50 — append adds both 40 and 50 as separate elements, and -1 is the last one",
      "4 [40, 50] — append adds the entire list as ONE element, so data[-1] is the nested list",
      "4 50 — append adds the list as one element, but indexing into it returns the last number",
      "Error — you can't append a list to a list because the types are incompatible"
    ],
    ans: 1,
    explanation: ".append() adds its argument as a single element, regardless of what it is. So data becomes [10, 20, 30, [40, 50]] — 4 elements, where the 4th element is itself a list. data[-1] returns that nested list: [40, 50]. If you wanted 5 separate elements, use .extend([40, 50]) instead, which unpacks the iterable and adds each item individually. This append-vs-extend confusion is one of the most common list bugs."
  },
  {
    q: "What does this code print?<br><br><code>data = [10, 20, 30, 40, 50]\nprint(data[::2])</code>",
    opts: [
      "[10, 20, 30, 40, 50] — the step of 2 has no effect when start and stop are omitted",
      "[10, 30, 50] — starts at index 0, takes every 2nd element (step=2) through the whole list",
      "[20, 40] — starts at index 1 because step=2 skips the first element",
      "[10, 20] — the 2 means \"take only 2 elements from the start\""
    ],
    ans: 1,
    explanation: "The slice [::2] means [start:stop:step] with start=beginning, stop=end, step=2. It takes every 2nd element starting from index 0: indices 0, 2, 4 → values [10, 30, 50]. The step parameter is the third value in the slice — it controls how many indices to skip between elements. [::3] would give every 3rd element, [::-1] reverses the list. This is more advanced than basic [1:4] slicing and is useful for things like selecting alternating rows from data."
  },
  {
    q: "What does this code print?<br><br><code>nums = [3, 1, 4, 1, 5]\nresult = sorted(nums)\nprint(nums, result)</code>",
    opts: [
      "[1, 1, 3, 4, 5] [1, 1, 3, 4, 5] — both sorted",
      "[3, 1, 4, 1, 5] [1, 1, 3, 4, 5]",
      "[1, 1, 3, 4, 5] [3, 1, 4, 1, 5]",
      "[3, 1, 4, 1, 5] [3, 1, 4, 1, 5] — sorted returns None"
    ],
    ans: 1,
    explanation: "sorted() returns a NEW sorted list and leaves the original unchanged. nums stays [3, 1, 4, 1, 5], result is the new sorted list [1, 1, 3, 4, 5]. This is different from nums.sort(), which sorts in-place (modifies the original) and returns None. Confusing sorted() with .sort() is a common bug — one creates a copy, the other mutates."
  },
  {
    q: "What does this code print?<br><br><code>colors = [&#39;red&#39;, &#39;green&#39;, &#39;blue&#39;]\ncolors.insert(1, &#39;yellow&#39;)\nprint(colors[2])</code>",
    opts: [
      "green",
      "yellow",
      "blue",
      "red"
    ],
    ans: 0,
    explanation: "insert(1, 'yellow') puts 'yellow' at index 1, shifting everything after it. The list becomes ['red', 'yellow', 'green', 'blue']. So colors[2] is 'green'."
  },
  {
    q: "What does this code print?<br><br><code>d = {&#39;a&#39;: 1, &#39;b&#39;: 2, &#39;c&#39;: 3}\nprint(d.get(&#39;x&#39;, 0))</code>",
    opts: [
      "None",
      "KeyError",
      "0",
      "x"
    ],
    ans: 2,
    explanation: ".get('x', 0) looks for key 'x'. Since it doesn't exist, it returns the default value 0 instead of raising a KeyError."
  },
  {
    q: "What does this code print?<br><br><code>d = {&#39;a&#39;: 1, &#39;b&#39;: 2}\nd[&#39;c&#39;] = 3\nd[&#39;a&#39;] = 99\ndel d[&#39;b&#39;]\nprint(d)</code>",
    opts: [
      "{'a': 1, 'b': 2, 'c': 3} — the original dict with 'c' added, but 'a' and 'b' changes were ignored",
      "{'a': 99, 'c': 3} — 'a' was updated to 99, 'c' was added, 'b' was deleted",
      "{'c': 3, 'a': 99} — same keys but in reverse order because del rearranges the dict",
      "Error — you can't delete a key from a dictionary while other code still references it"
    ],
    ans: 1,
    explanation: "Walk through it step by step: start with {'a': 1, 'b': 2}. d['c'] = 3 adds a new key → {'a': 1, 'b': 2, 'c': 3}. d['a'] = 99 updates existing key 'a' → {'a': 99, 'b': 2, 'c': 3}. del d['b'] removes key 'b' entirely → {'a': 99, 'c': 3}. Key point: assigning to an existing key updates it (doesn't create a duplicate), and del removes a key-value pair completely. Dicts in Python 3.7+ maintain insertion order."
  },
  {
    q: "What does this code print?<br><br><code>s = {1, 2, 3, 2, 1}\nprint(len(s))</code>",
    opts: [
      "5",
      "3",
      "2",
      "Error: duplicate elements"
    ],
    ans: 1,
    explanation: "Sets automatically discard duplicate values — that's their defining feature. When you write {1, 2, 3, 2, 1}, Python keeps only the unique values: {1, 2, 3}, which has 3 elements. No error is raised; duplicates are silently dropped. This is why sets are useful for deduplication (list(set(my_list)) removes duplicates) and for fast membership testing ('x' in my_set is O(1) vs O(n) for lists)."
  },
  {
    q: "What does this code print?<br><br><code>a = {1, 2, 3, 4}\nb = {3, 4, 5, 6}\nprint(a & b)</code>",
    opts: [
      "{1, 2, 3, 4, 5, 6}",
      "{3, 4}",
      "{1, 2, 5, 6}",
      "Error"
    ],
    ans: 1,
    explanation: "The & operator on sets returns the intersection — elements in both sets. 3 and 4 are in both a and b. Use | for union."
  },
  {
    q: "What does this code print?<br><br><code>d = {&#39;x&#39;: 10, &#39;y&#39;: 20}\nkeys = list(d.keys())\nprint(keys)</code>",
    opts: [
      "['x', 'y']",
      "[10, 20]",
      "[('x', 10), ('y', 20)]",
      "{'x', 'y'}"
    ],
    ans: 0,
    explanation: "d.keys() returns the dictionary's keys. list() converts them to a regular list: ['x', 'y']."
  },
  {
    q: "What does this code print?<br><br><code>x = 42\nif x &gt; 100:\n    label = &#39;big&#39;\nelif x &gt; 50:\n    label = &#39;medium&#39;\nelif x &gt; 0:\n    label = &#39;small&#39;\nelse:\n    label = &#39;zero&#39;\nprint(label, x % 10)</code>",
    opts: [
      "medium 42",
      "small 2",
      "big 2",
      "zero 42"
    ],
    ans: 1,
    explanation: "42 > 100 is False. 42 > 50 is False. 42 > 0 is True → label = 'small'. Once a branch matches, all remaining elif/else are skipped. 42 % 10 = 2 (remainder). So it prints 'small 2'."
  },
  {
    q: "What does this code print?<br><br><code>result = []\nfor i in range(3):\n    result.append(i * 2)\nprint(result)</code>",
    opts: [
      "[0, 1, 2]",
      "[2, 4, 6]",
      "[0, 2, 4]",
      "[1, 2, 3]"
    ],
    ans: 2,
    explanation: "range(3) produces 0, 1, 2. Multiplying each by 2: 0\u00d72=0, 1\u00d72=2, 2\u00d72=4. Result: [0, 2, 4]."
  },
  {
    q: "What does this code print?<br><br><code>words = [&#39;hello&#39;, &#39;world&#39;]\nfor i, w in enumerate(words):\n    print(f&#39;{i}: {w}&#39;)</code>",
    opts: [
      "hello: 0 then world: 1",
      "0: hello then 1: world",
      "1: hello then 2: world",
      "Error: too many values"
    ],
    ans: 1,
    explanation: "enumerate() wraps an iterable and returns (index, value) tuples. For ['hello', 'world'], it produces (0, 'hello') and (1, 'world'). The 'for i, w in ...' syntax unpacks each tuple into two variables. This is the Pythonic alternative to the ugly 'for i in range(len(words)): w = words[i]' pattern. The index starts at 0 by default, but you can change it with enumerate(words, start=1) to get (1, 'hello'), (2, 'world')."
  },
  {
    q: "What does this code print?<br><br><code>nums = [1, 2, 3, 4, 5]\nevens = [x for x in nums if x % 2 == 0]\nprint(evens)</code>",
    opts: [
      "[1, 3, 5]",
      "[2, 4]",
      "[1, 2, 3, 4, 5]",
      "[0, 0, 0, 0, 0]"
    ],
    ans: 1,
    explanation: "The comprehension keeps only elements where x % 2 == 0 (even numbers). 2 and 4 qualify."
  },
  {
    q: "What does this code print?<br><br><code>names = [&#39;Alice&#39;, &#39;Bob&#39;, &#39;Charlie&#39;]\nscores = [90, 85]\npairs = list(zip(names, scores))\nprint(len(pairs), pairs[-1])</code>",
    opts: [
      "3 ('Charlie', None) — zip pads the shorter list with None to match the longer one",
      "2 ('Bob', 85) — zip stops at the SHORTEST iterable, so 'Charlie' is silently dropped",
      "3 ('Charlie', 85) — zip repeats the last score for any unmatched names",
      "Error — zip requires both lists to have exactly the same length"
    ],
    ans: 1,
    explanation: "zip() pairs elements by position and stops at the shortest iterable. With 3 names and 2 scores, you get only 2 pairs: [('Alice', 90), ('Bob', 85)]. 'Charlie' is silently dropped — no error, no warning. This is a common source of silent data loss. If you want to keep all elements and fill missing values, use itertools.zip_longest(names, scores, fillvalue=0) instead. Always check that your iterables have matching lengths before zipping."
  },
  {
    q: "What does this code print?<br><br><code>def power(base, exp=2):\n    return base ** exp\n\nresults = [power(3), power(2, 3), power(exp=4, base=2)]\nprint(results)</code>",
    opts: [
      "[9, 8, 16]",
      "[6, 6, 8]",
      "[9, 6, 16]",
      "Error: keyword argument before positional"
    ],
    ans: 0,
    explanation: "power(3) uses default exp=2 → 3²=9. power(2, 3) → 2³=8. power(exp=4, base=2) uses keyword args (order doesn't matter when named) → 2⁴=16. Result: [9, 8, 16]."
  },
  {
    q: "What does this code print?<br><br><code>def process(items):\n    result = []\n    for item in items:\n        if isinstance(item, str):\n            result.append(item.upper())\n        else:\n            result.append(item * 2)\n    return result\n\nprint(process([1, &#39;hi&#39;, 3, &#39;bye&#39;]))</code>",
    opts: [
      "[2, &#39;HI&#39;, 6, &#39;BYE&#39;]",
      "[1, &#39;HI&#39;, 3, &#39;BYE&#39;]",
      "[&#39;1&#39;, &#39;HI&#39;, &#39;3&#39;, &#39;BYE&#39;]",
      "Error: can't mix types"
    ],
    ans: 0,
    explanation: "The function checks each item's type. Strings get .upper(): 'hi'→'HI', 'bye'→'BYE'. Non-strings get multiplied by 2: 1→2, 3→6. Python lists can hold mixed types — no error. Result: [2, 'HI', 6, 'BYE']."
  },
  {
    q: "What does this code print?<br><br><code>x = 10\ndef change():\n    x = 20\n\nchange()\nprint(x)</code>",
    opts: [
      "20",
      "10",
      "Error: x is not defined",
      "None"
    ],
    ans: 1,
    explanation: "Inside change(), 'x = 20' creates a new local variable that shadows the global x. The global x was never modified."
  },
  {
    q: "What does this code print?<br><br><code>with open(&#39;data.txt&#39;, &#39;w&#39;) as f:\n    f.write(&#39;hello\\n&#39;)\n    f.write(&#39;world&#39;)\n\nwith open(&#39;data.txt&#39;, &#39;r&#39;) as f:\n    lines = f.readlines()\nprint(len(lines), lines[0].strip())</code>",
    opts: [
      "1 helloworld",
      "2 hello",
      "2 hello\\n",
      "Error: can't read right after writing"
    ],
    ans: 1,
    explanation: "The first 'with' block writes two lines: 'hello\\n' and 'world'. The '\\n' after 'hello' creates a line break, so the file has 2 lines. The second 'with' block reads them — readlines() returns ['hello\\n', 'world'], a list of 2 elements. lines[0] is 'hello\\n' and .strip() removes the trailing newline → 'hello'. The file is automatically closed and flushed after each 'with' block exits."
  },
  {
    q: "What does this code print?<br><br><code>def process(data: list[int]) -&gt; int:\n    return sum(data)\n\nresult = process([&#39;a&#39;, &#39;b&#39;, &#39;c&#39;])\nprint(result)</code>",
    opts: [
      "0",
      "3",
      "Error: type hints are enforced and strings were passed",
      "Error: sum() can't add strings this way"
    ],
    ans: 3,
    explanation: "Type hints are NOT enforced at runtime. However, sum() tries to add strings starting from 0 (int), which fails because you can't add int + str. The error is from sum()'s logic, not type hints."

];

let currentQ = 0;
let answers = new Array(questions.length).fill(null);
let userName = "";
let userGithub = "";

function startQuiz() {
  userName = document.getElementById("userName").value.trim();
  userGithub = document.getElementById("userGithub").value.trim();
  if (!userName) { alert("Please enter your name."); return; }
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  quizActive = true;
  renderQuestion();
}

let quizActive = false;

document.getElementById("userName").addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("userGithub").focus(); }
});
document.getElementById("userGithub").addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); startQuiz(); }
});
document.addEventListener("keydown", function(e) {
  if (!quizActive) return;
  if (e.key === "Enter" && answers[currentQ] !== null) {
    e.preventDefault();
    if (currentQ === questions.length - 1) submitQuiz(); else nextQuestion();
  }
});

function getSection(idx) {
  for (const s of sections) { if (idx >= s.range[0] && idx < s.range[1]) return s.title; }
  return "";
}

function renderQuestion() {
  const q = questions[currentQ];
  const letters = ["A", "B", "C", "D"];
  const card = document.getElementById("questionCard");

  let html = `<div class="section-badge">${getSection(currentQ)}</div>`;
  html += `<h2>Q${currentQ + 1}. ${q.q}</h2>`;
  html += `<div class="options">`;
  q.opts.forEach((opt, i) => {
    const sel = answers[currentQ] === i ? " selected" : "";
    html += `<div class="option${sel}" onclick="selectOption(${i})">
      <span class="letter">${letters[i]}</span>
      <span class="text">${opt}</span>
    </div>`;
  });
  html += `</div>`;
  card.innerHTML = html;
  card.querySelectorAll('code').forEach(el => el.classList.add('language-python'));
  if (typeof Prism !== 'undefined') Prism.highlightAllUnder(card);

  const nav = document.getElementById("qNav");
  let navHtml = "";
  for (let n = 0; n < questions.length; n++) {
    let cls = "q-nav-btn";
    if (n === currentQ) cls += " active";
    else if (answers[n] !== null) cls += " answered";
    navHtml += `<button class="${cls}" onclick="jumpTo(${n})">${n + 1}</button>`;
  }
  nav.innerHTML = navHtml;

  document.getElementById("progressLabel").textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById("sectionLabel").textContent = getSection(currentQ);
  document.getElementById("progressFill").style.width = ((currentQ + 1) / questions.length * 100) + "%";

  document.getElementById("prevBtn").style.visibility = currentQ === 0 ? "hidden" : "visible";
  const nextBtn = document.getElementById("nextBtn");
  if (currentQ === questions.length - 1) { nextBtn.textContent = "Submit Quiz"; nextBtn.onclick = submitQuiz; }
  else { nextBtn.textContent = "Next"; nextBtn.onclick = nextQuestion; }
}

function selectOption(idx) { answers[currentQ] = idx; renderQuestion(); }
function jumpTo(idx) { currentQ = idx; renderQuestion(); window.scrollTo({ top: 0, behavior: "smooth" }); }
function nextQuestion() {
  if (answers[currentQ] === null) { alert("Please select an answer before continuing."); return; }
  if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); window.scrollTo({ top: 0, behavior: "smooth" }); }
}
function prevQuestion() { if (currentQ > 0) { currentQ--; renderQuestion(); window.scrollTo({ top: 0, behavior: "smooth" }); } }

function submitQuiz() {
  if (answers[currentQ] === null) { alert("Please select an answer before submitting."); return; }
  const unanswered = answers.findIndex(a => a === null);
  if (unanswered !== -1) { alert(`Please answer Question ${unanswered + 1} before submitting.`); currentQ = unanswered; renderQuestion(); return; }
  if (!confirm("Submit your quiz? You won't be able to change answers.")) return;
  quizActive = false;
  const results = questions.map((q, i) => answers[i] === q.ans);
  const score = results.filter(Boolean).length;
  sendResults(results, score);
  showResults(results, score);
}

function sendResults(results, score) {
  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") { console.warn("No Apps Script URL configured."); return; }
  fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ quizName: QUIZ_NAME, name: userName, github: userGithub, results: results })
  }).catch(err => console.error("Failed to save results:", err));
}

function showResults(results, score) {
  document.getElementById("quizScreen").classList.add("hidden");
  const container = document.getElementById("resultsScreen");
  container.classList.remove("hidden");
  const pct = Math.round((score / questions.length) * 100);
  const tier = pct >= 80 ? "high" : pct >= 50 ? "mid" : "low";
  const message = pct >= 80 ? "Excellent work!" : pct >= 50 ? "Good effort \u2014 review the topics you missed." : "Keep studying \u2014 review the explanations below.";
  let html = `
    <div class="score-circle score-${tier}">
      <span class="number">${score}/${questions.length}</span>
      <span class="label">${pct}%</span>
    </div>
    <h1>${message}</h1>
    <p class="results-subtitle">${userName}${userGithub ? " &bull; @" + userGithub : ""}</p>
    <div class="review-list">`;
  const letters = ["A", "B", "C", "D"];
  questions.forEach((q, i) => {
    const correct = results[i];
    const cls = correct ? "correct" : "incorrect";
    const status = correct ? "\u2713 Correct" : "\u2717 Incorrect";
    html += `<div class="review-item ${cls}">`;
    html += `<div class="q-title">Q${i + 1}. ${q.q}</div>`;
    html += `<div class="status-badge ${cls}">${status}</div>`;
    html += `<div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} \u2014 ${q.opts[answers[i]]}</div>`;
    if (!correct) html += `<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} \u2014 ${q.opts[q.ans]}</div>`;
    html += `<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div>`;
    html += `</div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
  container.querySelectorAll('code').forEach(el => el.classList.add('language-python'));
  if (typeof Prism !== 'undefined') Prism.highlightAllUnder(container);
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
