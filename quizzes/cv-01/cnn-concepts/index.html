<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME="CNN — Concepts";

const sections=[
  {title:"Section 1: Why Convolutions for Images",range:[0,4]},
  {title:"Section 2: Kernels, Stride, Padding",range:[4,9]},
  {title:"Section 3: Pooling",range:[9,13]},
  {title:"Section 4: Feature Maps",range:[13,16]},
  {title:"Section 5: Training & Common Failures",range:[16,25]}
];

const questions=[
  // == Section 1 ==
  {q:"A student wants to classify 224×224 RGB images. They propose flattening to a vector and feeding a <code>Linear(224*224*3, 1024)</code> first layer. What's the strongest argument against this?",opts:["Dense layers can't learn from images — they need RGB pixels rearranged into a single grayscale spatial channel first","154M parameters in the first layer alone — memory + overfitting + ignores spatial structure","Linear layers always need grayscale input","The 1024 output is too large for classification"],ans:1,explanation:"224·224·3·1024 ≈ 154M params for one layer. Conv layers reuse a small kernel across every spatial position (parameter sharing), needing orders of magnitude less memory while actually exploiting \"a cat's ear looks the same anywhere in the image.\""},
  {q:"A student trains a CNN on cat photos where the cat is <strong>always centered</strong> in the frame. At evaluation time, they show the model a cat that's <strong>shifted to the left edge</strong> — a position the model never saw during training. The model still predicts \"cat\" correctly. Which property of CNNs explains this?",opts:["Translation invariance — the same convolution filters scan every part of the image, so a \"cat ear\" or \"cat eye\" detector fires whether the cat is centered or off to the side. Pooling adds further tolerance to the exact position","Overfitting — the model has memorised its training cats well enough to handle small variations","Backpropagation — gradients automatically adjust the weights to spot cats anywhere in the image, regardless of position","Data augmentation — the training set already contained shifted cats, so the model implicitly learned to handle them"],ans:0,explanation:"Convolution slides <strong>the same kernel</strong> across every spatial position — so a feature like \"pointed ear\" is detected wherever it appears in the image. Pooling adds further tolerance because the exact pixel coordinates of the feature don't matter inside each pooling window. This is why a CNN trained on centered cats can still spot a cat in the corner. (Note: invariance has limits — extreme shifts or rotations can still throw it off, especially if no augmentation was used.)"},
  {q:"What's the <strong>main reason</strong> conv layers are preferred over fully-connected layers for image inputs?",opts:["Conv layers are always faster on CPU because they avoid the matrix multiplications that dense layers depend on heavily","Conv layers exploit two image-specific priors: locality (a small kernel only looks at nearby pixels) and weight sharing (the same kernel applies everywhere) — far fewer parameters than dense for the same input","Conv layers automatically apply softmax at the end","Conv layers don't need an activation function"],ans:1,explanation:"Images have structure: nearby pixels relate to each other, and a feature like an \"edge\" looks the same anywhere in the image. Conv layers bake both of those assumptions into the network architecture — same kernel slid across every position. Dense layers don't, which is why they need many more parameters to do the same job and why we don't use them as the workhorse for image inputs."},
  {q:"A student stacks <code>Conv2d → Conv2d → Conv2d</code> with <strong>no ReLU</strong> in between. The model learns far less than expected. Why does the missing ReLU matter?",opts:["PyTorch silently disables gradient flow when ReLU is missing inside a <code>Sequential</code> block","Three convs with no non-linearity collapse into one equivalent linear operation — depth gains nothing","The kernel size auto-doubles every time a ReLU layer is omitted between convs","ReLU is only used inside the loss function, not between conv layers"],ans:1,explanation:"Linear ∘ linear = still linear. Without a non-linearity between them, three conv layers act like one — the network can rotate and scale the input but never bend it. ReLU is what lets each conv build genuinely new representations on top of the previous one."},
  // == Section 2 ==
  {q:"A 3×3 convolution with <code>stride=1, padding=1</code> is applied to a <code>(1, 28, 28)</code> input. What is the output spatial size and why?",opts:["26×26 — the 3×3 kernel can't reach the border pixels, so the output naturally shrinks by 2 on each side","28×28 — padding=1 exactly compensates for the 3×3 kernel's 1-pixel shrink on each side","30×30 — padding adds a border so the output grows","14×14 — stride 1 halves the dimensions"],ans:1,explanation:"Output spatial = ⌊(input + 2·pad − kernel) / stride⌋ + 1 = ⌊(28 + 2 − 3) / 1⌋ + 1 = 28. Padding=1 with kernel=3 is the standard \"same-size\" convolution pattern. <strong>What <code>padding=N</code> means:</strong> PyTorch's <code>padding</code> is an <em>integer count</em> of rows/columns added to each side. <code>padding=0</code> = no padding. <code>padding=1</code> = 1 row of zeros on top + bottom + 1 column on left + right. The same-size rule for stride 1 is <code>padding = kernel_size // 2</code>."},
  {q:"Modern CNNs almost always use small (3×3) kernels rather than big ones (e.g., 11×11), even when the task needs to look at a wide region of the image. Why?",opts:["Large kernels can't run on a GPU because cuDNN's optimised paths are hard-coded for 3×3 and 5×5 kernels only","Stacking small kernels uses fewer parameters AND inserts non-linearities (ReLU) between layers — both make the network more expressive than one big linear kernel","PyTorch only supports 3×3 kernels","Small kernels detect more colours"],ans:1,explanation:"A single 11×11 conv is one linear operation with 121 weights per channel-pair. Three stacked 3×3 convs use 27 weights per channel-pair AND apply ReLU twice in between — so the network can learn more complex combinations of features for the same input region. VGG and ResNet are built almost entirely from 3×3 convs for this reason."},
  {q:"Which statement <strong>best</strong> describes stride?",opts:["Stride changes the number of output channels","<code>stride=2</code> means the kernel moves 2 pixels per step, usually downsampling spatial resolution; a strided conv can replace pooling as a learnable downsampler","<code>stride=2</code> requires <code>kernel_size=2</code>","Stride adds padding automatically so that the output spatial size always matches the input size"],ans:1,explanation:"Stride is the step size of the kernel. Larger stride → smaller output. <code>stride=2</code> is roughly equivalent to inserting a 2×2 pool afterward, but the conv weights <em>learn</em> what to keep — modern architectures (ResNet, etc.) often use strided 3×3 convs instead of explicit pooling."},
  {q:"A neuron deep inside a CNN can \"see\" a much larger region of the original image than its 3×3 kernel suggests. Why?",opts:["Deep neurons have much larger weights, which let them aggregate signal from far-away parts of the input image at once","Each layer's neurons look at a small patch of the previous layer's output. Stack many layers and that \"patch of a patch of a patch\" can cover most of the original image. This growing window is called the receptive field — and it's why deep CNNs handle global image structure even with tiny kernels","Deep neurons skip the convolution","Pooling tells the neuron the image size"],ans:1,explanation:"A neuron in conv layer 3 sees a 3×3 patch of layer-2's output. But each pixel of layer-2 itself was computed from a 3×3 patch of layer-1, which in turn came from a 3×3 patch of the input. After stacking, that compounding \"patch of patches\" is the <strong>receptive field</strong> — typically dozens of pixels wide deep in the network. Pooling and stride accelerate this growth even faster. It's why a CNN with only 3×3 kernels can still understand whole-object context."},
  {q:"When you want a <code>k×k</code> convolution (with stride 1) to <strong>preserve the spatial size</strong> of its input — i.e., a 28×28 input stays 28×28 after the conv — the standard rule is <code>padding = kernel_size // 2</code>. Why does this rule work?",opts:["<code>kernel_size // 2</code> is just a PyTorch convention — the actual padding needed is auto-computed by <code>Conv2d</code> based on the input image size at runtime","A <code>k×k</code> kernel with stride 1 and no padding shrinks the output by <code>k-1</code> pixels total (half on each side). Adding <code>k // 2</code> zeros to each side puts back exactly what the kernel takes off, so output size = input size","Padding equal to half the kernel size doubles the receptive field, which compensates for the convolution's natural shrinking effect","<code>kernel_size // 2</code> works for 3×3 only — for larger kernels you need a different formula based on the stride and the input dimensions"],ans:1,explanation:"With stride 1, the output spatial formula is <code>input + 2·pad − kernel + 1</code>. Plug in <code>pad = kernel // 2</code> for an odd kernel: <code>input + (kernel − 1) − kernel + 1 = input</code>. Output exactly matches input. This works for any odd kernel: 3 → pad 1, 5 → pad 2, 7 → pad 3. Even kernel sizes (2×2, 4×4) don't have a clean integer same-size padding, which is part of why CNN architectures almost always use odd kernels."},
  // == Section 3 ==
  {q:"Why does MaxPool2d have zero learnable parameters?",opts:["Max is non-differentiable, so PyTorch blocks learning through any layer that uses it","It's a fixed function (pick the max of a window) — nothing to learn, no weights","Its parameters are shared with the next Conv layer","It's a bug in PyTorch"],ans:1,explanation:"Pooling is purely structural — it defines an aggregation rule (max or mean) over a spatial window. No weights → no params → no learning. That's why swapping max-pool for avg-pool doesn't change the parameter count."},
  {q:"A 2×2 MaxPool with stride=2 is applied to a (32, 14, 14) feature map. What's the output shape and why?",opts:["(32, 14, 14) — pooling preserves size","(16, 14, 14) — channels halve","(32, 7, 7) — spatial halves, channels untouched","(64, 7, 7) — channels and spatial change"],ans:2,explanation:"Pooling operates <strong>per channel</strong>, so the channel dim is untouched. 2×2 pool with stride 2 halves each spatial dim: 14 → 7."},
  {q:"A student claims \"average pooling is strictly better than max pooling because averaging uses all the information.\" What's the counterargument?",opts:["Average pooling is not differentiable, so gradients cannot flow back through it during training","Max pool selects the strongest activation — for features like \"is there an edge here?\", the max preserves presence while average dilutes it","Average pooling only works for odd kernel sizes","Average pooling doesn't backprop correctly"],ans:1,explanation:"Neither is universally better — they encode different priors. Max pool says \"pick the strongest response in this window\" (good for detecting features). Average pool says \"summarise the average response\" (good for smoother representations, common at the final layer). Modern architectures often use both."},
  {q:"<strong>Global Average Pooling (GAP)</strong> is a pooling operation that averages each channel down to a <strong>single number</strong> — turning a <code>(C, H, W)</code> feature map into a <code>(C, 1, 1)</code> tensor regardless of <code>H</code> and <code>W</code>. Modern CNNs (ResNet, MobileNet) use it just before the final classifier, so the classifier sees one number per channel instead of a flattened spatial grid.<br><br>Trace the shapes through this snippet. What are the shapes <strong>after MaxPool</strong> and <strong>after GAP</strong>?<pre class='language-python'><code class='language-python'>import torch, torch.nn as nn\nx    = torch.randn(1, 3, 32, 32)\nconv = nn.Conv2d(3, 64, 3, padding=1)   # → (1, 64, 32, 32)\npool = nn.MaxPool2d(2, 2)               # after pool: ?\ngap  = nn.AdaptiveAvgPool2d(1)          # after gap:  ?\nout  = gap(pool(conv(x)))</code></pre>",opts:["After pool <code>(1, 64, 32, 32)</code> — pooling preserves size; after gap <code>(1, 64, 1, 1)</code>","After pool <code>(1, 64, 16, 16)</code> — 2×2 stride-2 pool halves H and W; after gap <code>(1, 64, 1, 1)</code> — GAP averages each channel to one number","After pool <code>(1, 64, 16, 16)</code>; after gap <code>(1, 1, 1, 1)</code> — GAP collapses everything to one scalar","After pool <code>(1, 32, 16, 16)</code> — pooling halves channels too; after gap <code>(1, 32, 1, 1)</code>"],ans:1,explanation:"<code>MaxPool2d(2, 2)</code> operates <em>per channel</em> and halves each spatial dim — <code>(64, 32, 32)</code> → <code>(64, 16, 16)</code>. Then <code>AdaptiveAvgPool2d(1)</code> averages each <code>(H, W)</code> plane to a single number — <code>(64, 16, 16)</code> → <code>(64, 1, 1)</code>. Why GAP is useful: the classifier that follows can be tiny — <code>Linear(64, num_classes)</code> — instead of <code>Linear(64·16·16, num_classes)</code>. ResNet, MobileNet, and most modern CNNs use this exact pattern."},
  // == Section 4 ==
  {q:"A <code>Conv2d(1, 16, kernel_size=3, padding=1)</code> layer receives one grayscale image of shape <code>(1, 28, 28)</code> and returns a <code>(16, 28, 28)</code> tensor. What does <strong>each output channel</strong> represent?",opts:["One class probability — each of the 16 output channels predicts a different class for the input image","One learned feature map — the spatial response of one filter scanned across the input","One copy of the original image","One training example"],ans:1,explanation:"Each output channel is the spatial response of one of the 16 learned filters convolved over the input. Early layers tend to learn simple patterns (edges, colour blobs); deeper layers combine those into textures, parts, and eventually object-like detectors. A \"feature map\" is <em>not</em> a probability or a class — it's a 2-D activation grid showing where in the image that filter fired."},
  {q:"Different layers of a trained CNN tend to learn different kinds of features. What's the typical progression from early layers to deep layers?",opts:["Early layers learn shapes; later layers learn edges","Early layers learn simple patterns like edges and colour blobs; the next layers combine those into textures; deeper layers combine textures into object parts; the deepest layers represent whole-object concepts","All layers learn the same kind of features (edges, textures, parts) — only the weight values change from layer to layer, so the hierarchy is uniform","Early layers learn class probabilities; later layers learn pixel values"],ans:1,explanation:"This hierarchy is one of the well-known findings about CNNs (Zeiler &amp; Fergus visualisations). Early filters resemble Gabor-like edge detectors; deeper filters combine them into textures, parts, and eventually object-like concepts. The <em>direction</em> matters: simple → complex, low-level → high-level — never the other way around."},
  {q:"A typical CNN doubles the number of filters as it gets deeper: 16 → 32 → 64 → 128. What's the intuition?",opts:["Deeper layers need fewer parameters, so we add filters to compensate","Spatial size shrinks (via pooling/stride) as you go deeper, freeing the network to use more channels per pixel. More channels = more distinct features the layer can detect at that depth. Early layers find a few simple features (edges, blobs); deep layers find many compound concepts (parts, objects)","PyTorch requires powers of 2","The doubling is needed for GPU memory alignment — channel counts that aren't powers of 2 force cuDNN to fall back to slow code paths"],ans:1,explanation:"Imagine a tradeoff: at every layer, the total number of activations roughly stays constant. Spatial dimensions shrink (e.g., 28→14→7) so to keep the activation budget steady, channel counts grow (16→32→64). Practically: early layers don't need many filters because there are few simple patterns to detect; deep layers need many filters because object parts are diverse. The 2× doubling is a convention that balances expressiveness against parameter cost."},
  // == Section 5 ==
  {q:"After training a CNN you observe these numbers:<pre class='language-python'><code class='language-python'>train loss = 0.02   train accuracy = 99%\nval   loss = 0.65   val   accuracy = 82%</code></pre>What's the most likely diagnosis and a sensible first mitigation?",opts:["Underfitting — both losses look similar in magnitude so the model is too small; add more layers and more filters and train for longer","Overfitting. Train loss is tiny while val loss is many times higher, and there's a 17-point accuracy gap — the model has memorised the training set. First fixes: add dropout, add data augmentation, add weight decay, or collect more training data","Wrong activation — switch ReLU to sigmoid","Learning rate too low — increase by 10×"],ans:1,explanation:"The signal isn't \"high train accuracy\" alone — it's the <strong>gap</strong> between train and val on both loss <em>and</em> accuracy. Train loss &lt;&lt; val loss and train acc &gt;&gt; val acc together is the textbook overfitting fingerprint. Regularisation (dropout, augmentation, weight decay) closes the gap by making the model less confident about exact training samples. Adding layers usually makes overfitting worse."},
  {q:"A student trains a CNN on photos of cats but adds <strong>random horizontal flips during training only</strong> — never at evaluation. Validation accuracy goes up. Why?",opts:["Flipping doubles the variety of cats the model sees (\"a left-facing cat is still a cat\"), so the model learns features that don't depend on the exact orientation. This is one of the simplest forms of data augmentation, and it tends to reduce overfitting.","Flipping makes the loss function easier to optimise because the symmetric pairs of images give gradients that perfectly cancel and stabilise training","Flipping makes training faster","Flipping reduces the number of model parameters"],ans:0,explanation:"Augmentation adds variability <em>during training</em>, so the model can't memorise specific orientations or positions — it has to learn features that work in either case. At evaluation we want clean, deterministic measurements, so augmentation is train-only. Common augmentations: random crops, flips, color jitter, mild rotations. Don't apply augmentations that change the <em>meaning</em> of the image — e.g., flipping a '6' makes it a '9'."},
  {q:"A student writes this CNN for 28×28 grayscale images. The forward pass crashes with a shape mismatch at the <code>Linear</code> layer. What's the mistake?<pre class='language-python'><code class='language-python'>import torch.nn as nn\nmodel = nn.Sequential(\n    nn.Conv2d(1,  16, 3, padding=0),   # 1 → 16, no padding\n    nn.Conv2d(16, 16, 3, padding=0),   # 16 → 16, no padding\n    nn.Flatten(),\n    nn.Linear(28 * 28 * 16, 10),       # ← assumes spatial is still 28×28\n)</code></pre>",opts:["<code>Sequential</code> doesn't allow stacking two <code>Conv2d</code> layers in a row without a pooling layer between them","Each unpadded 3×3 conv shrinks spatial by 2: 28 → 26 → 24, so the real flat size is 24·24·16 — the <code>Linear</code> was hard-coded for 28·28·16","<code>padding=0</code> actually adds 1 row of zeros on each side, so the size is unchanged","<code>nn.Linear</code> accepts any input shape and reshapes it automatically to fit its weight matrix"],ans:1,explanation:"Trace the spatial size through each conv: 28 → 26 → 24. Channels stay at 16 throughout. So the tensor reaching <code>Linear</code> has shape <code>(batch, 16, 24, 24)</code> → flattens to <code>(batch, 9216)</code>. But the <code>Linear</code> was written for <code>28·28·16 = 12544</code>. Mismatch → <code>RuntimeError</code>. Two fixes: (1) use <code>padding=1</code> everywhere to preserve spatial size (most common); (2) compute the actual flat size from the trace and put it in the <code>Linear</code>."},
  {q:"A student adds <code>BatchNorm2d</code> after each conv in their CNN. They forget to call <code>model.eval()</code> before validation, and validation accuracy comes out <strong>inconsistent between runs</strong> even on the exact same images. Why does BatchNorm specifically need <code>model.eval()</code>?",opts:["BatchNorm tracks gradient updates only in eval mode, so without <code>model.eval()</code> the layer never learns proper running statistics during training","In train mode, BatchNorm normalises using the current batch's mean and variance — so an image's normalised value depends on which other images happened to share its batch. In eval mode, BatchNorm uses fixed running statistics accumulated during training, making evaluation deterministic","<code>model.eval()</code> doubles the BatchNorm parameters; without it the layer runs at half capacity and produces noisier outputs","BatchNorm in train mode randomly drops feature maps similar to Dropout, which adds noise to validation when not switched off"],ans:1,explanation:"BatchNorm normalises activations using statistics computed at the layer. In <strong>train mode</strong> it uses <em>this batch's</em> mean/variance — fine for training (it acts like a regulariser), but a bug at evaluation: the same input produces different outputs depending on its batch-mates. <code>model.eval()</code> flips BN to use the <strong>running statistics</strong> it accumulated across all training batches, so the same image always gives the same output."},
  {q:"Dropout randomly zeros some neurons during training. Why does this reduce overfitting?",opts:["The zeroed neurons are permanently disabled after training, leaving a smaller model with fewer parameters available to overfit on the training data","The model can't rely on any specific neuron — it might be zeroed next batch — so it spreads the work across many","Dropout averages all neurons into a single ensemble output during training","Smaller gradients during backprop slow convergence, preventing the model from memorising the training set as quickly"],ans:1,explanation:"Different neurons are zeroed each batch, so the model can't form dependencies on specific ones. It learns redundant features that work even when neurons are missing — and redundant features generalise better."},
  {q:"A CNN built for grayscale (<code>Conv2d(1, 16, 3)</code>) is now run on RGB photos. The first forward pass crashes with a channel-mismatch error. Why?",opts:["RGB photos must be converted to grayscale first — PyTorch's <code>Conv2d</code> only processes one input channel at a time and silently averages multi-channel input otherwise","RGB images have 3 channels (R, G, B), grayscale has 1. The first <code>Conv2d</code>'s <code>in_channels</code> argument must match the input — change it to <code>Conv2d(3, 16, 3)</code>. The kernel itself becomes 3D: <code>(out_channels, 3, 3, 3)</code> instead of <code>(out_channels, 1, 3, 3)</code>","The kernel size needs to triple","PyTorch doesn't support RGB"],ans:1,explanation:"<code>in_channels</code> is the <em>first</em> dimension of the kernel weight tensor. For grayscale: weight shape <code>(16, 1, 3, 3)</code> and the conv \"sees\" one channel of the input. For RGB: <code>(16, 3, 3, 3)</code> — the conv now sees all three colour channels at once and learns to combine them. Same fix for RGBA (4 channels) or any multi-band imagery."},
  {q:"A CNN is trained for 30 epochs. Looking at the loss curves over time:<br>• <strong>Train loss</strong> decreases steadily, then plateaus around epoch 20.<br>• <strong>Val loss</strong> decreases until about epoch 12, then <strong>starts going UP</strong> while train loss is still slowly dropping.<br><br>What is happening, and what's the standard fix?",opts:["The optimizer is broken — switch from Adam to SGD","Underfitting — train loss is plateauing too early so add more layers, add more filters per layer, train for more epochs, and increase the learning rate","Overfitting starting around epoch 12. Past the val-loss minimum, the model is memorising training noise faster than learning generalisable patterns. Standard fixes: stop training at the val-loss minimum (early stopping), add regularisation (dropout, weight decay, augmentation), or collect more data","The learning rate is too low — increase it 10×"],ans:2,explanation:"Two signals together diagnose <strong>overfitting over time</strong>: (1) train loss still decreasing while val loss starts rising, and (2) the train–val gap widening. The cheapest fix is <strong>early stopping</strong> — save the model at the val-loss minimum. Regularisation (dropout, weight decay, augmentation) flattens the gap; more data is the most reliable but most expensive fix."},
  {q:"Why is it a bad idea to initialise all weights in a CNN to <strong>zero</strong>?",opts:["Zero is not a valid float in PyTorch","Every neuron in a layer would compute the same output, get the same gradient, and update identically — so they could never learn different features. PyTorch initialises weights with small random values to break this symmetry","Zero initialisation is too slow on the CPU because PyTorch has to special-case the all-zero weight tensor before every forward pass and every backward gradient update","Zero initialisation requires more memory than random initialisation"],ans:1,explanation:"Imagine your first conv layer has 64 filters. If they all start at zero, every filter computes the same thing (zero) on every input, gets the same gradient, and updates to the same values. Your 64 filters become 1 filter repeated 64 times — the network never learns 64 different features. That's why PyTorch initialises weights with small random values: to make the filters start out <em>different</em> so they can specialise during training."},
  {q:"A CNN is training. After 30 epochs, <strong>both train loss and val loss are still high and both still decreasing</strong>, with no big gap between them. What's the most likely diagnosis and the right next step?",opts:["Overfitting — both losses are still high so the model is about to memorise the training set; add dropout, weight decay, and data augmentation now","The optimizer is broken — switch to SGD","Underfitting. The model hasn't learned enough patterns yet. Fixes: train for more epochs, increase capacity (more filters or more layers), or try a higher learning rate","The loss function is wrong — switch from CrossEntropy to MSE"],ans:2,explanation:"Two signs of underfitting together: (1) both train and val losses are <em>high</em> (the model can't even fit the training data well, let alone generalise), and (2) the train–val gap is <em>small</em> (overfitting would make the gap widen). The right response is more capacity or more training — <strong>not</strong> more regularisation, which would make underfitting worse."}
];

let currentQ=0,answers=new Array(questions.length).fill(null),userName="",userGithub="";
function startQuiz(){userName=document.getElementById("userName").value.trim();userGithub=document.getElementById("userGithub").value.trim();if(!userName){alert("Please enter your name.");return;}document.getElementById("startScreen").classList.add("hidden");document.getElementById("quizScreen").classList.remove("hidden");quizActive=true;renderQuestion();}
let quizActive=false;
document.getElementById("userName").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("userGithub").focus();}});
document.getElementById("userGithub").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();startQuiz();}});
document.addEventListener("keydown",function(e){if(!quizActive)return;if(e.key==="Enter"&&answers[currentQ]!==null){e.preventDefault();if(currentQ===questions.length-1)submitQuiz();else nextQuestion();}});
function getSection(idx){for(const s of sections){if(idx>=s.range[0]&&idx<s.range[1])return s.title;}return"";}
function renderQuestion(){const q=questions[currentQ],letters=["A","B","C","D"],card=document.getElementById("questionCard");let html=`<div class="section-badge">${getSection(currentQ)}</div><h2>Q${currentQ+1}. ${q.q}</h2><div class="options">`;q.opts.forEach((opt,i)=>{const sel=answers[currentQ]===i?" selected":"";html+=`<div class="option${sel}" onclick="selectOption(${i})"><span class="letter">${letters[i]}</span><span class="text">${opt}</span></div>`;});html+=`</div>`;card.innerHTML=html;if(window.Prism){Prism.highlightAllUnder(card);}if(window.Prism){Prism.highlightAllUnder(card);}const nav=document.getElementById("qNav");let navHtml="";for(let n=0;n<questions.length;n++){let cls="q-nav-btn";if(n===currentQ)cls+=" active";else if(answers[n]!==null)cls+=" answered";navHtml+=`<button class="${cls}" onclick="jumpTo(${n})">${n+1}</button>`;}nav.innerHTML=navHtml;document.getElementById("progressLabel").textContent=`Question ${currentQ+1} of ${questions.length}`;document.getElementById("sectionLabel").textContent=getSection(currentQ);document.getElementById("progressFill").style.width=((currentQ+1)/questions.length*100)+"%";document.getElementById("prevBtn").style.visibility=currentQ===0?"hidden":"visible";const nextBtn=document.getElementById("nextBtn");if(currentQ===questions.length-1){nextBtn.textContent="Submit Quiz";nextBtn.onclick=submitQuiz;}else{nextBtn.textContent="Next";nextBtn.onclick=nextQuestion;}}
function selectOption(idx){answers[currentQ]=idx;renderQuestion();}function jumpTo(idx){currentQ=idx;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}function nextQuestion(){if(answers[currentQ]===null){alert("Please select an answer before continuing.");return;}if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function submitQuiz(){if(answers[currentQ]===null){alert("Please select an answer before submitting.");return;}const unanswered=answers.findIndex(a=>a===null);if(unanswered!==-1){alert(`Please answer Question ${unanswered+1} before submitting.`);currentQ=unanswered;renderQuestion();return;}if(!confirm("Submit your quiz? You won't be able to change answers."))return;quizActive=false;const results=questions.map((q,i)=>answers[i]===q.ans);const score=results.filter(Boolean).length;sendResults(results,score);showResults(results,score);}
function sendResults(results,score){if(SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){console.warn("No Apps Script URL configured.");return;}fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({quizName:QUIZ_NAME,name:userName,github:userGithub,results:results})}).catch(err=>console.error("Failed:",err));}
function showResults(results,score){document.getElementById("quizScreen").classList.add("hidden");const container=document.getElementById("resultsScreen");container.classList.remove("hidden");const pct=Math.round((score/questions.length)*100),tier=pct>=80?"high":pct>=50?"mid":"low";const message=pct>=80?"Excellent work!":pct>=50?"Good effort — review the topics you missed.":"Keep studying — review the explanations below.";let html=`<div class="score-circle score-${tier}"><span class="number">${score}/${questions.length}</span><span class="label">${pct}%</span></div><h1>${message}</h1><p class="results-subtitle">${userName}${userGithub?" &bull; @"+userGithub:""}</p><div class="review-list">`;const letters=["A","B","C","D"];questions.forEach((q,i)=>{const correct=results[i];const cls=correct?"correct":"incorrect";const status=correct?"✓ Correct":"✗ Incorrect";html+=`<div class="review-item ${cls}"><div class="q-title">Q${i+1}. ${q.q}</div><div class="status-badge ${cls}">${status}</div><div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} — ${q.opts[answers[i]]}</div>`;if(!correct)html+=`<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} — ${q.opts[q.ans]}</div>`;html+=`<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div></div>`;});html+=`</div>`;container.innerHTML=html;if(window.Prism){Prism.highlightAllUnder(container);}window.scrollTo({top:0,behavior:"smooth"});}
</script>
