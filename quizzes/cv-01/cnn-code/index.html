<style>
:root{--pri-900:#134E3A;--pri-800:#1A6B4F;--pri-700:#218764;--pri-600:#28A37A;--pri-500:#34C090;--pri-400:#5CD4A8;--pri-300:#8AE4C2;--pri-200:#B5EEDB;--pri-100:#D9F7EC;--pri-50:#EDFBF5;--slate-50:#F7F8FA;--slate-100:#EDEEF2;--slate-200:#D5D7DE;--slate-500:#6B7280;--slate-700:#374151;--slate-900:#111827;--success:#059669;--success-bg:#ECFDF5;--error:#DC2626;--error-bg:#FEF2F2;--accent:#F59E0B;--font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--radius-md:10px;--radius-lg:16px;--shadow-md:0 4px 12px rgba(0,0,0,.10);--ease:cubic-bezier(.4,0,.2,1)}

ding:2.5rem;box-shadow:var(--shadow-md);border:1px solid var(--slate-200);animation:slideIn 0.3s var(--ease)}@keyframes slideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}.section-badge{display:inline-block;background:var(--pri-50);color:var(--pri-700);font-size:0.75rem;font-weight:600;padding:0.3rem 0.8rem;border-radius:20px;margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.03em}.question-card h2{font-size:1.2rem;font-weight:700;color:var(--slate-900);line-height:1.5;margin-bottom:1.5rem}.question-card pre{background:#1e1e1e;color:#d4d4d4;padding:1rem;border-radius:8px;font-size:0.85rem;overflow-x:auto;margin:0.85rem 0;font-family:'SF Mono',Menlo,Consolas,monospace;white-space:pre;font-weight:400}.question-card code{font-family:'SF Mono',Menlo,Consolas,monospace;background:var(--slate-100);padding:0.1rem 0.35rem;border-radius:4px;font-size:0.92em;color:var(--pri-800)}.question-card pre code{background:transparent;padding:0;color:inherit}.options{display:flex;flex-direction:column;gap:0.75rem}.option{display:flex;align-items:flex-start;gap:0.85rem;padding:1rem 1.2rem;border:2px solid var(--slate-200);border-radius:var(--radius-md);cursor:pointer;transition:all 0.15s var(--ease);line-height:1.5}.option:hover{border-color:var(--pri-300);background:var(--pri-50)}.option.selected{border-color:var(--pri-500);background:var(--pri-50)}.option .letter{flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--slate-100);color:var(--slate-700);font-weight:600;font-size:0.85rem;margin-top:1px}.option.selected .letter{background:var(--pri-600);color:white}.option .text{font-size:1rem;color:var(--slate-700)}.option code{font-family:'SF Mono',Menlo,Consolas,monospace;background:rgba(0,0,0,0.06);padding:0.05rem 0.3rem;border-radius:4px;font-size:0.92em}.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem}.results-screen{background:white;border-radius:var(--radius-lg);padding:3rem;box-shadow:var(--shadow-md);border:1px solid var(--slate-200);animation:slideIn 0.3s var(--ease)}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-weight:800}.score-circle .number{font-size:2.8rem;line-height:1}.score-circle .label{font-size:0.85rem;font-weight:500;margin-top:0.25rem}.score-high{background:var(--success-bg);color:var(--success);border:3px solid var(--success)}.score-mid{background:#FFF8E7;color:#B8860B;border:3px solid #C49545}.score-low{background:var(--error-bg);color:var(--error);border:3px solid var(--error)}.results-screen h1{text-align:center;font-size:1.5rem;color:var(--pri-800);margin-bottom:0.5rem}.results-screen .results-subtitle{text-align:center;color:var(--slate-500);margin-top:0.75rem;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--slate-200)}.review-list{display:flex;flex-direction:column;gap:1rem}.review-item{padding:1.2rem;border-radius:var(--radius-md);border-left:4px solid}.review-item.correct{background:var(--success-bg);border-color:var(--success)}.review-item.incorrect{background:var(--error-bg);border-color:var(--error)}.review-item .q-title{font-weight:600;font-size:0.95rem;margin-bottom:0.5rem;color:var(--slate-900)}.review-item .status-badge{display:inline-block;font-size:0.8rem;font-weight:700;padding:0.2rem 0.7rem;border-radius:20px;margin-bottom:0.5rem}.review-item .status-badge.correct{background:var(--success);color:white}.review-item .status-badge.incorrect{background:var(--error);color:white}.review-item .your-answer{font-size:0.9rem;color:var(--slate-700);margin-bottom:0.25rem}.review-item .correct-answer{font-size:0.9rem;color:var(--success);font-weight:500;margin-top:0.25rem}.review-item .explanation{font-size:0.85rem;color:var(--slate-500);margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid rgba(0,0,0,0.08)}.review-item code{font-family:'SF Mono',Menlo,Consolas,monospace;background:rgba(0,0,0,0.06);padding:0.05rem 0.3rem;border-radius:4px;font-size:0.9em}.review-item pre{background:#1e1e1e;color:#d4d4d4;padding:0.75rem;border-radius:6px;font-size:0.78rem;overflow-x:auto;margin:0.5rem 0;font-family:'SF Mono',Menlo,Consolas,monospace;white-space:pre}.q-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;justify-content:center}.q-nav-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--slate-200);background:white;color:var(--slate-500);font-family:var(--font-body);font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.15s var(--ease);display:flex;align-items:center;justify-content:center}.q-nav-btn:hover{border-color:var(--pri-400);color:var(--pri-700)}.q-nav-btn.active{background:var(--pri-700);color:white;border-color:var(--pri-700);font-weight:700}.q-nav-btn.answered{background:var(--pri-100);border-color:var(--pri-400);color:var(--pri-800)}.q-nav-btn.answered.active{background:var(--pri-700);color:white;border-color:var(--pri-700)}.hidden{display:none}
@media(max-width:600px){body{padding:0.75rem}.question-card,.start-screen,.results-screen{padding:1.25rem}.question-card h2{font-size:1rem}.option{padding:0.75rem 1rem;gap:0.6rem}.option .text{font-size:0.9rem}.option .letter{width:24px;height:24px;font-size:0.75rem}.q-nav{gap:4px}.q-nav-btn{width:28px;height:28px;font-size:0.7rem}.nav-row{margin-top:1rem}.btn{padding:0.75rem 1.5rem;font-size:0.9rem}.start-screen h1{font-size:1.4rem}.start-screen input{padding:0.7rem 0.85rem;font-size:0.9rem}.review-item{padding:1rem}.score-circle{width:130px;height:130px}.score-circle .number{font-size:2.2rem}.question-card pre{font-size:0.75rem;padding:0.75rem}}

<body>
<div class="quiz-container">
  <div id="startScreen" class="start-screen">
    <h1>Quiz &mdash; CNN: Code Reading</h1>
    <p class="subtitle">Read the code, predict the output &mdash; 20 Questions</p>
    <input type="text" id="userName" placeholder="Your Full Name" required>
    <input type="text" id="userGithub" placeholder="GitHub Username — optional">
    <p class="info">7 sections &bull; ~12 minutes &bull; Answer in your head &mdash; no need to run the code</p>
    <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>
  <div id="quizScreen" class="hidden">
    <div class="q-nav" id="qNav"></div>
    <div class="progress-text"><span id="progressLabel">Question 1 of 20</span><span id="sectionLabel"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5%"></div></div>
    <div class="question-card" id="questionCard"></div>
    <div class="nav-row"><button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Back</button><button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button></div>
  </div>
  <div id="resultsScreen" class="results-screen hidden"></div>
</div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME="CNN — Code Reading";

const sections=[
  {title:"Section 1: Conv2d output shapes",range:[0,4]},
  {title:"Section 2: Pool / flatten shapes",range:[4,7]},
  {title:"Section 3: Parameter count",range:[7,9]},
  {title:"Section 4: Forward pass tracing",range:[9,11]},
  {title:"Section 5: Channel / shape errors",range:[11,14]},
  {title:"Section 6: Loss & gradient sanity",range:[14,17]},
  {title:"Section 7: Training & eval",range:[17,20]}
];

const questions=[
  // == Section 1 ==
  {q:"What does this print?<pre><code>import torch, torch.nn as nn\nx = torch.randn(4, 1, 28, 28)\nconv = nn.Conv2d(1, 16, kernel_size=3, padding=1)\nprint(conv(x).shape)</code></pre>",opts:["torch.Size([4, 16, 28, 28])","torch.Size([4, 16, 26, 26])","torch.Size([4, 1, 28, 28])","torch.Size([4, 16, 30, 30])"],ans:0,explanation:"Output spatial = ⌊(28 + 2·1 − 3) / 1⌋ + 1 = ⌊27 / 1⌋ + 1 = <strong>28</strong>. Out channels = 16, batch = 4 (unchanged). Result: <code>torch.Size([4, 16, 28, 28])</code>."},
  {q:"What does this print?<pre><code>import torch, torch.nn as nn\nx = torch.randn(2, 3, 16, 16)\nconv = nn.Conv2d(3, 8, kernel_size=3, stride=2, padding=1)\nprint(conv(x).shape)</code></pre>",opts:["torch.Size([2, 8, 16, 16])","torch.Size([2, 8, 8, 8])","torch.Size([2, 8, 14, 14])","torch.Size([2, 3, 8, 8])"],ans:1,explanation:"Output spatial = ⌊(16 + 2·1 − 3) / 2⌋ + 1 = ⌊15 / 2⌋ + 1 = 7 + 1 = <strong>8</strong>. Out channels = 8. Result: <code>torch.Size([2, 8, 8, 8])</code>."},
  {q:"What does this print?<pre><code>import torch, torch.nn as nn\nx = torch.randn(1, 1, 5, 5)\nconv = nn.Conv2d(1, 4, kernel_size=3, padding=0)   # no padding\nprint(conv(x).shape)</code></pre>",opts:["torch.Size([1, 4, 5, 5])","torch.Size([1, 4, 3, 3])","torch.Size([1, 1, 3, 3])","torch.Size([1, 4, 7, 7])"],ans:1,explanation:"Output spatial = ⌊(5 + 0 − 3) / 1⌋ + 1 = 2 + 1 = <strong>3</strong>. Out channels = 4. Result: <code>torch.Size([1, 4, 3, 3])</code>."},
  {q:"What does this print?<pre><code>import torch, torch.nn as nn\nx = torch.randn(8, 3, 32, 32)\nconv = nn.Conv2d(3, 8, kernel_size=5, padding=2)\nprint(conv(x).shape)</code></pre>",opts:["torch.Size([8, 8, 32, 32])","torch.Size([8, 8, 28, 28])","torch.Size([8, 3, 32, 32])","torch.Size([8, 8, 36, 36])"],ans:0,explanation:"Output spatial = ⌊(32 + 2·2 − 5) / 1⌋ + 1 = 31 + 1 = <strong>32</strong>. Padding=2 with kernel=5 is the \"same-size\" rule (<code>padding = kernel // 2</code>). Result: <code>torch.Size([8, 8, 32, 32])</code>."},
  // == Section 2 ==
  {q:"What does this print?<pre><code>import torch, torch.nn as nn\nx = torch.randn(4, 16, 8, 8)\npool = nn.MaxPool2d(2, 2)\nprint(pool(x).shape)</code></pre>",opts:["torch.Size([4, 16, 4, 4])","torch.Size([4, 16, 8, 8])","torch.Size([4, 8, 4, 4])","torch.Size([4, 32, 4, 4])"],ans:0,explanation:"Pool acts per channel — channel and batch dims unchanged. 2×2 pool with stride 2 halves each spatial dim: 8 → <strong>4</strong>. Result: <code>torch.Size([4, 16, 4, 4])</code>."},
  {q:"What does this print?<pre><code>import torch\nx = torch.randn(2, 4, 3, 3)\nprint(x.flatten(1).shape)</code></pre>",opts:["torch.Size([2, 36])","torch.Size([72])","torch.Size([2, 4, 9])","torch.Size([2, 12])"],ans:0,explanation:"<code>flatten(1)</code> keeps dim 0 (batch) and flattens the rest. Flat size = 4 · 3 · 3 = <strong>36</strong>. Result: <code>torch.Size([2, 36])</code>."},
  {q:"What does this print?<pre><code>import torch, torch.nn as nn\nx = torch.randn(1, 32, 7, 7)\ngap = nn.AdaptiveAvgPool2d(1)         # global average pool\nprint(gap(x).shape)</code></pre>",opts:["torch.Size([1, 32])","torch.Size([1, 32, 7, 7])","torch.Size([1, 32, 1, 1])","torch.Size([32, 1, 1])"],ans:2,explanation:"<code>AdaptiveAvgPool2d(1)</code> averages each channel down to a single value, leaving a 1×1 spatial map. Result: <code>torch.Size([1, 32, 1, 1])</code>. Usually followed by <code>.flatten(1)</code> to get <code>(1, 32)</code>."},
  // == Section 3 ==
  {q:"How many learnable parameters does this conv have (with bias)?<pre><code>import torch.nn as nn\nconv = nn.Conv2d(1, 4, kernel_size=3)</code></pre>",opts:["9","36","40","13"],ans:2,explanation:"Weights = <code>in · out · k · k</code> = 1 · 4 · 3 · 3 = 36. Biases = <code>out</code> = 4. Total = 36 + 4 = <strong>40</strong>."},
  {q:"How many learnable parameters does this pool have?<pre><code>import torch.nn as nn\npool = nn.MaxPool2d(2, 2)\ntotal = sum(p.numel() for p in pool.parameters())\nprint(total)</code></pre>",opts:["0","4","2","16"],ans:0,explanation:"<code>MaxPool2d</code> is a fixed function — no learnable weights. <code>pool.parameters()</code> returns an empty iterator → sum = <strong>0</strong>."},
  // == Section 4 ==
  {q:"A small CNN takes <code>x = torch.randn(2, 1, 8, 8)</code>. What is <code>model(x).shape</code>?<pre><code>import torch, torch.nn as nn, torch.nn.functional as F\nclass Net(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.c1   = nn.Conv2d(1, 4, 3, padding=1)\n        self.pool = nn.MaxPool2d(2, 2)\n        self.fc   = nn.Linear(4 * 4 * 4, 10)\n    def forward(self, x):\n        x = self.pool(F.relu(self.c1(x)))\n        return self.fc(x.flatten(1))\nmodel = Net()</code></pre>",opts:["torch.Size([2, 10])","torch.Size([10])","torch.Size([2, 4, 4, 4])","torch.Size([2, 1, 10])"],ans:0,explanation:"Trace: <code>(2, 1, 8, 8)</code> → c1+pool → <code>(2, 4, 4, 4)</code> → flatten(1) → <code>(2, 64)</code> → fc → <code>(2, 10)</code>."},
  {q:"In the <code>Net</code> from the previous question, what's the input size to <code>self.fc</code>?",opts:["8 × 8 = 64","4 × 4 × 4 = 64","1 × 8 × 8 = 64","4 × 8 × 8 = 256"],ans:1,explanation:"After <code>c1+pool</code>: channels = 4, spatial = 8 / 2 = 4. Flat size = <code>channels · H · W</code> = 4 · 4 · 4 = <strong>64</strong>. The Linear was sized to match this exactly."},
  // == Section 5 ==
  {q:"What happens here, and why?<pre><code>import torch, torch.nn as nn\nx = torch.randn(2, 3, 16, 16)\nconv = nn.Conv2d(1, 4, 3)\nout = conv(x)</code></pre>",opts:["Runs and returns shape (2, 4, 14, 14)","Silently returns wrong values","RuntimeError — Conv2d expects 1 in_channel, got 3","Returns shape (2, 1, 16, 16)"],ans:2,explanation:"The conv weight has shape <code>(4, 1, 3, 3)</code> — built for 1 input channel. Input has 3. Mismatch at the channel dim → <code>RuntimeError</code>. Fix: <code>nn.Conv2d(3, 4, 3)</code> so the conv expects 3 channels."},
  {q:"What happens here, and why?<pre><code>import torch, torch.nn as nn\nx = torch.randn(28, 28)               # only (H, W)\nconv = nn.Conv2d(1, 4, 3, padding=1)\nout = conv(x)</code></pre>",opts:["Runs and returns (4, 28, 28)","Runs and returns (1, 4, 28, 28)","RuntimeError — needs at least (C, H, W)","Returns (1, 1, 28, 28) auto-batched"],ans:2,explanation:"<code>Conv2d</code> accepts batched <code>(N, C, H, W)</code> or unbatched <code>(C, H, W)</code> — but <strong>never</strong> plain <code>(H, W)</code>. Fix: <code>x = x.unsqueeze(0)</code> → <code>(1, 28, 28)</code>, or <code>x.unsqueeze(0).unsqueeze(0)</code> → <code>(1, 1, 28, 28)</code>."},
  {q:"What's wrong with this model?<pre><code>import torch, torch.nn as nn\nmodel = nn.Sequential(\n    nn.Conv2d(1, 8, 3, padding=1),\n    nn.Flatten(),\n    nn.MaxPool2d(2),\n    nn.Linear(8 * 14 * 14, 10),\n)\nx = torch.randn(4, 1, 28, 28)\nout = model(x)</code></pre>",opts:["Order is wrong — pool must come before flatten","Linear weight is the wrong size","MaxPool2d doesn't support batches","Conv2d should have padding=0"],ans:0,explanation:"After <code>Flatten()</code> the tensor is 2-D <code>(4, 6272)</code>. <code>MaxPool2d</code> then needs spatial dims to operate on, but they're gone. RuntimeError. Correct order: <strong>conv → pool → flatten → linear</strong>."},
  // == Section 6 ==
  {q:"What's a reasonable expectation for the <strong>first-step loss</strong> of this <strong>untrained</strong> classifier, and why?<pre><code>import torch, torch.nn as nn, torch.nn.functional as F\nmodel = nn.Linear(4, 10)              # 10 classes, untrained\nx = torch.randn(8, 4)\ny = torch.randint(0, 10, (8,))\nloss = F.cross_entropy(model(x), y)</code></pre>",opts:["Roughly <strong>zero</strong> — random init is already correct","Roughly <strong>log(K)</strong> where K is the number of classes — untrained logits are near-uniform, so the model assigns ~1/K probability to every class, giving cross-entropy = −log(1/K) = log(K)","Roughly <strong>K</strong> — equal to the number of classes","<strong>NaN</strong> until the optimizer takes a step"],ans:1,explanation:"The point of the question is the <strong>formula</strong>, not a specific number: an untrained classifier produces near-uniform probabilities → CE ≈ log(K). Useful sanity check: at training step 1, your loss should be in this ballpark. If it's far from log(K), something is off (bad init, double softmax, label dtype mismatch, etc.)."},
  {q:"What does this print?<pre><code>import torch, torch.nn as nn, torch.nn.functional as F\nmodel = nn.Linear(4, 2)\nx = torch.randn(8, 4)\ny = torch.randint(0, 2, (8,))\nprint(model.weight.grad is None)      # before backward\nloss = F.cross_entropy(model(x), y)\nloss.backward()\nprint(model.weight.grad is None)      # after backward</code></pre>",opts:["True / True","True / False","False / True","False / False"],ans:1,explanation:"Before any <code>backward()</code>: <code>.grad</code> attributes start as <code>None</code>. → prints <code>True</code>. After <code>loss.backward()</code>: PyTorch fills <code>.grad</code> with a tensor of the same shape as the parameter. → prints <code>False</code>."},
  {q:"What does this print, and why?<pre><code>import torch\na = torch.tensor([1.0, 2.0], requires_grad=True)\nb = (a * a).sum()\nb.backward()\nb.backward()                           # second call</code></pre>",opts:["Prints <code>tensor([2., 4.])</code> twice","RuntimeError on the second <code>backward()</code> — graph already freed","Silently runs both times","Returns <code>None</code>"],ans:1,explanation:"By default PyTorch frees the autograd graph after <code>.backward()</code> to save memory. A second <code>backward()</code> raises: <code>RuntimeError: Trying to backward through the graph a second time</code>. Pass <code>retain_graph=True</code> if you really need to call backward twice."},
  // == Section 7 ==
  {q:"What bug is in this training step?<pre><code>for xb, yb in loader:\n    loss = F.cross_entropy(model(xb), yb)\n    loss.backward()\n    optimizer.step()</code></pre>",opts:["Missing <code>model.eval()</code> before the loop","Missing <code>optimizer.zero_grad()</code> — gradients accumulate","<code>argmax(1)</code> should be <code>argmax(0)</code>","<code>loss.item()</code> is missing"],ans:1,explanation:"PyTorch accumulates gradients into <code>.grad</code> by default — without <code>zero_grad()</code>, every step adds to the previous step's gradients and the loss explodes. Idiomatic order: <strong>zero_grad → forward → backward → step</strong>."},
  {q:"What does this print, and why?<pre><code>import torch, torch.nn as nn\ntorch.manual_seed(0)\nmodel = nn.Sequential(nn.Linear(4, 8), nn.Dropout(0.5), nn.Linear(8, 1))\nx = torch.ones(1, 4)\nout1 = model(x).item()                 # train mode (default)\nout2 = model(x).item()                 # train mode again\nprint(out1 == out2)</code></pre>",opts:["True","False","Depends on the seed","RuntimeError"],ans:1,explanation:"Newly-built models start in <strong>train mode</strong>, so <code>Dropout(0.5)</code> randomly zeros ~half the activations on every forward pass. Two calls with the same <code>x</code> give different outputs → <code>out1 != out2</code> → prints <code>False</code>. Fix: call <code>model.eval()</code> before evaluating."},
  {q:"What does this script do?<pre><code>import torch, torch.nn as nn\nmodel = nn.Linear(10, 2)\ntorch.save(model.state_dict(), \"model.pt\")\nfresh = nn.Linear(10, 2)\nfresh.load_state_dict(torch.load(\"model.pt\"))</code></pre>",opts:["Saves the entire Python object including hooks","Saves only the learnable params and loads them into a new model of the same architecture","Saves the optimizer state","Re-runs training from scratch on load"],ans:1,explanation:"<code>state_dict()</code> returns an <code>OrderedDict</code> of <code>parameter_name → tensor</code> — just the weights and biases. The architecture is <strong>not</strong> saved, so you must rebuild the model the same way before loading. This is the recommended PyTorch save/load pattern."}
];

let currentQ=0,answers=new Array(questions.length).fill(null),userName="",userGithub="";
function startQuiz(){userName=document.getElementById("userName").value.trim();userGithub=document.getElementById("userGithub").value.trim();if(!userName){alert("Please enter your name.");return;}document.getElementById("startScreen").classList.add("hidden");document.getElementById("quizScreen").classList.remove("hidden");quizActive=true;renderQuestion();}
let quizActive=false;
document.getElementById("userName").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("userGithub").focus();}});
document.getElementById("userGithub").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();startQuiz();}});
document.addEventListener("keydown",function(e){if(!quizActive)return;if(e.key==="Enter"&&answers[currentQ]!==null){e.preventDefault();if(currentQ===questions.length-1)submitQuiz();else nextQuestion();}});
function getSection(idx){for(const s of sections){if(idx>=s.range[0]&&idx<s.range[1])return s.title;}return"";}
function renderQuestion(){const q=questions[currentQ],letters=["A","B","C","D"],card=document.getElementById("questionCard");let html=`<div class="section-badge">${getSection(currentQ)}</div><h2>Q${currentQ+1}. ${q.q}</h2><div class="options">`;q.opts.forEach((opt,i)=>{const sel=answers[currentQ]===i?" selected":"";html+=`<div class="option${sel}" onclick="selectOption(${i})"><span class="letter">${letters[i]}</span><span class="text">${opt}</span></div>`;});html+=`</div>`;card.innerHTML=html;const nav=document.getElementById("qNav");let navHtml="";for(let n=0;n<questions.length;n++){let cls="q-nav-btn";if(n===currentQ)cls+=" active";else if(answers[n]!==null)cls+=" answered";navHtml+=`<button class="${cls}" onclick="jumpTo(${n})">${n+1}</button>`;}nav.innerHTML=navHtml;document.getElementById("progressLabel").textContent=`Question ${currentQ+1} of ${questions.length}`;document.getElementById("sectionLabel").textContent=getSection(currentQ);document.getElementById("progressFill").style.width=((currentQ+1)/questions.length*100)+"%";document.getElementById("prevBtn").style.visibility=currentQ===0?"hidden":"visible";const nextBtn=document.getElementById("nextBtn");if(currentQ===questions.length-1){nextBtn.textContent="Submit Quiz";nextBtn.onclick=submitQuiz;}else{nextBtn.textContent="Next";nextBtn.onclick=nextQuestion;}}
function selectOption(idx){answers[currentQ]=idx;renderQuestion();}function jumpTo(idx){currentQ=idx;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}function nextQuestion(){if(answers[currentQ]===null){alert("Please select an answer before continuing.");return;}if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function submitQuiz(){if(answers[currentQ]===null){alert("Please select an answer before submitting.");return;}const unanswered=answers.findIndex(a=>a===null);if(unanswered!==-1){alert(`Please answer Question ${unanswered+1} before submitting.`);currentQ=unanswered;renderQuestion();return;}if(!confirm("Submit your quiz? You won't be able to change answers."))return;quizActive=false;const results=questions.map((q,i)=>answers[i]===q.ans);const score=results.filter(Boolean).length;sendResults(results,score);showResults(results,score);}
function sendResults(results,score){if(SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){console.warn("No Apps Script URL configured.");return;}fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({quizName:QUIZ_NAME,name:userName,github:userGithub,results:results})}).catch(err=>console.error("Failed:",err));}
function showResults(results,score){document.getElementById("quizScreen").classList.add("hidden");const container=document.getElementById("resultsScreen");container.classList.remove("hidden");const pct=Math.round((score/questions.length)*100),tier=pct>=80?"high":pct>=50?"mid":"low";const message=pct>=80?"Excellent work!":pct>=50?"Good effort — review the topics you missed.":"Keep studying — review the explanations below.";let html=`<div class="score-circle score-${tier}"><span class="number">${score}/${questions.length}</span><span class="label">${pct}%</span></div><h1>${message}</h1><p class="results-subtitle">${userName}${userGithub?" &bull; @"+userGithub:""}</p><div class="review-list">`;const letters=["A","B","C","D"];questions.forEach((q,i)=>{const correct=results[i];const cls=correct?"correct":"incorrect";const status=correct?"✓ Correct":"✗ Incorrect";html+=`<div class="review-item ${cls}"><div class="q-title">Q${i+1}. ${q.q}</div><div class="status-badge ${cls}">${status}</div><div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} — ${q.opts[answers[i]]}</div>`;if(!correct)html+=`<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} — ${q.opts[q.ans]}</div>`;html+=`<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div></div>`;});html+=`</div>`;container.innerHTML=html;window.scrollTo({top:0,behavior:"smooth"});}
</script>
