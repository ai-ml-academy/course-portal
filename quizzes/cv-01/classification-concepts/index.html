<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME="Classification — Concepts";

const sections=[
  {title:"Section 1: Logits, Softmax, Predicted Class",range:[0,3]},
  {title:"Section 2: CrossEntropyLoss & BCE",range:[3,6]},
  {title:"Section 3: Beyond Accuracy",range:[6,12]},
  {title:"Section 4: Train / Val / Test Discipline",range:[12,15]},
  {title:"Section 5: Reading the Model",range:[15,20]}
];

const questions=[
  // == Section 1 ==
  {q:"A <code>SimpleCNN</code> from class ends with <code>Linear(128, 10)</code> and is run on <strong>one</strong> Fashion-MNIST image. What is the output shape, and what does each number represent?",opts:["<code>(1, 1)</code> — the model returns one prediction per image","<code>(1, 10)</code> — ten logits, one raw score per Fashion-MNIST class","<code>(10,)</code> — one probability per class, summing to 1","<code>(1, 128)</code> — the dense layer's hidden representation, with 128 features per image"],ans:1,explanation:"The final <code>Linear(128, 10)</code> produces 10 numbers per image — one <strong>logit</strong> per Fashion-MNIST class. They are NOT probabilities yet (no softmax has been applied), and they don't have to sum to 1 or be positive. They're just raw scores, with the largest one indicating the model's predicted class."},
  {q:"A model produces logits <code>[1.2, 3.5, -0.4, 2.1]</code> for a 4-class problem. Which class does the model predict, and why use <code>argmax</code> instead of <code>max</code>?",opts:["The predicted class is 3.5 — the largest logit value gives the prediction directly","The predicted class is 1, because argmax returns the <em>index</em> of the largest logit, which is the class label we need","The predicted class is 0, because the first logit is always treated as the most likely class","The predicted class is 2.1 — the second-largest logit is taken to avoid extreme values"],ans:1,explanation:"<code>max</code> returns the largest value (<code>3.5</code>), but classes are identified by their <em>position</em> in the output, not the value. <code>argmax</code> returns the index of the largest entry — here, position <strong>1</strong>, so the model predicts class 1. In Fashion-MNIST these positions map to class names: 0=T-shirt, 1=Trouser, 2=Pullover, etc."},
  {q:"A student applies softmax to the logits and <em>then</em> takes argmax to get the predicted class. A teammate insists \"you don't need softmax — just take argmax of the raw logits.\" Who is right, and why?",opts:["Only softmax-then-argmax is correct — the raw logits aren't probabilities so the largest one isn't the predicted class","Both give the same predicted class — softmax preserves the order of the logits, so <code>argmax(logits) == argmax(softmax(logits))</code>. You only need softmax when you want probabilities themselves","Only argmax of raw logits is correct — softmax shifts the largest position because it normalises across classes","Both can be wrong — PyTorch's softmax sometimes rounds outputs in a way that changes which logit position becomes the largest"],ans:1,explanation:"Softmax is a <strong>monotonic</strong> transformation: if logit A &gt; logit B, then softmax(A) &gt; softmax(B). The ordering — and therefore the argmax — is unchanged. So if you only need the predicted class, skip the softmax. Apply softmax only when you actually want a probability you can show to a user (e.g., \"the model is 87% confident\")."},
  // == Section 2 ==
  {q:"A student writes this training step. Training works but barely improves — the loss decreases very slowly and accuracy stays around chance. What's the bug?<pre class='language-python'><code class='language-python'>import torch.nn.functional as F\nlogits = model(images)                 # (batch, 10) raw logits\nprobs  = F.softmax(logits, dim=1)      # apply softmax\nloss   = nn.CrossEntropyLoss()(probs, labels)</code></pre>",opts:["<code>softmax</code> should use <code>dim=0</code> so it normalises across the batch instead of across classes","<code>CrossEntropyLoss</code> already applies log-softmax internally — passing pre-softmaxed values means softmax is applied twice, flattening the signal the loss can use to learn","The labels need to be one-hot encoded before the loss is computed","<code>nn.CrossEntropyLoss()</code> should be created once at the top of the script, never inside the training loop"],ans:1,explanation:"<code>nn.CrossEntropyLoss</code> is <code>LogSoftmax</code> + <code>NLLLoss</code> fused for numerical stability. It expects <strong>raw logits</strong>, not softmax outputs. When you feed it post-softmax probabilities, the loss applies softmax again — and applying softmax twice squashes everything towards uniform, leaving very little gradient. The fix: pass <code>logits</code> directly, never <code>probs</code>."},
  {q:"A student trains a 10-class classifier on Fashion-MNIST. The training loop has these tensor shapes going into <code>nn.CrossEntropyLoss()</code>:<pre class='language-python'><code class='language-python'>logits = model(images)              # shape (32, 10), dtype float32\nlabels = ...                        # what should this be?\nloss   = nn.CrossEntropyLoss()(logits, labels)</code></pre>What does <code>labels</code> need to look like?",opts:["shape <code>(32, 10)</code> one-hot float vectors, so the loss can compare element-wise to the logits","shape <code>(32,)</code>, dtype <code>torch.long</code>, integer class indices in <code>[0, 10)</code>","shape <code>(32, 1)</code>, dtype <code>torch.float32</code>, the class index stored as a float for each image in the batch","shape <code>(32,)</code>, dtype <code>torch.float32</code>, class indices stored as floats so the loss can backpropagate through them"],ans:1,explanation:"<code>CrossEntropyLoss</code> for multi-class classification expects logits of shape <code>(batch, num_classes)</code> paired with labels of shape <code>(batch,)</code> — one <strong>integer</strong> class index per image, dtype <code>long</code>. One-hot vectors and float-cast indices both raise. Two errors to recognise: <code>\"size of dimension X mismatch\"</code> (wrong shape) and <code>\"expected scalar type Long\"</code> (wrong dtype)."},
  {q:"Two classification problems sit on your desk:<br>• <strong>Problem 1:</strong> Fashion-MNIST — each image is <strong>exactly one</strong> of 10 garment classes (T-shirt, Trouser, Pullover, ...).<br>• <strong>Problem 2:</strong> Cat vs Dog — each image is <strong>exactly one</strong> of 2 classes.<br><br>Which loss + final activation matches each problem?",opts:["Both use <code>CrossEntropyLoss</code> + softmax — softmax handles 2 or more classes the same way without any special-case wiring","Both use <code>BCEWithLogitsLoss</code> + sigmoid — <code>BCEWithLogitsLoss</code> works for any number of classes once labels are one-hot","Problem 1 → <code>CrossEntropyLoss</code> + softmax (applied internally). Problem 2 (binary) → either <code>CrossEntropyLoss</code> with 2 logits OR <code>BCEWithLogitsLoss</code> with 1 logit + sigmoid; both work for binary, with the BCE+1-logit form being more common","Problem 1 → <code>BCEWithLogitsLoss</code>; Problem 2 → <code>CrossEntropyLoss</code> — pick the loss whose name doesn't match the obvious problem type to avoid ambiguity"],ans:2,explanation:"<strong>Multi-class</strong> (3+ mutually exclusive classes) uses softmax + cross-entropy: probabilities must sum to 1 because exactly one class is true. For <strong>binary</strong> (2 classes), <code>CrossEntropyLoss</code> with 2 logits still works — but PyTorch also provides <code>BCEWithLogitsLoss</code> (sigmoid + binary cross-entropy) as a more compact alternative: 1 logit, threshold at 0.5. Both binary setups are mathematically equivalent. In practice the 1-logit + BCE form is more common because it's slightly cheaper and reduces \"is this the positive class?\" to one number against 0.5."},
  // == Section 3 ==
  {q:"You train a fraud detector on a dataset where 95% of transactions are legitimate and 5% are fraud. Your model achieves <strong>95% accuracy</strong> on the validation set. Is this a good model?",opts:["Yes — 95% accuracy is excellent for any classification task","No — a model that always predicts \"legitimate\" without looking at the input would also get 95% accuracy. Use precision, recall, or F1 on the fraud class to see if the model is actually catching fraud","Yes — accuracy is the standard metric and 95% is the right benchmark for production","No — you should retrain with a higher learning rate so the model spends more time adjusting to the rare class"],ans:1,explanation:"On imbalanced data, accuracy tells you almost nothing about the rare class. The trivial \"always predict majority\" baseline would already get 95% here. To know whether the model is <em>useful</em>, ask \"of the transactions it flagged as fraud, how many really were?\" (precision) and \"of all the actual frauds, how many did it catch?\" (recall). The confusion matrix and per-class report make this obvious."},
  {q:"A 3-class confusion matrix from a Fashion-MNIST experiment (rows = true label, columns = predicted label):<pre class='language-python'><code class='language-python'>                Pred T-shirt   Pred Pullover   Pred Shirt\nTrue T-shirt        170              5             25\nTrue Pullover        10            178             12\nTrue Shirt           70              8            122</code></pre>Which observation is correct?",opts:["The model is perfect on Pullover and confuses every other class equally between the remaining two","Pullover is classified most accurately (178/200); the biggest off-diagonal confusion is Shirt being misclassified as T-shirt (70 cases)","Shirt is classified best — its diagonal value (122) means most shirts in the dataset are correctly labelled by the model","The matrix shows a balanced model — every off-diagonal cell is small enough to ignore in practice"],ans:1,explanation:"Diagonal entries are correct predictions per class. Pullover has 178/200 correct (89%), the highest of the three. The largest off-diagonal cell is row \"True Shirt\" / column \"Pred T-shirt\" = 70: the model frequently mistakes shirts for T-shirts. This is a real Fashion-MNIST failure mode and exactly the insight a confusion matrix gives you that overall accuracy hides."},
  {q:"Two scenarios on the same Fashion-MNIST shirt classifier:<br>• Scenario X: \"Every image we tag as 'shirt' must really be a shirt — false alarms are costly.\"<br>• Scenario Y: \"We must find every shirt in the catalogue — missing one is the costly mistake.\"<br><br>Which metric matters most in each scenario?",opts:["X → recall, Y → precision","X → precision, Y → recall","Both should optimise overall accuracy — it covers both cases at the same time","X → F1, Y → F1 — both scenarios always need the harmonic mean of precision and recall"],ans:1,explanation:"<strong>Precision</strong> asks \"of the items I flagged, how many are correct?\" — it punishes false alarms. <strong>Recall</strong> asks \"of all the true shirts, how many did I catch?\" — it punishes misses. Scenario X cares about avoiding false alarms → precision. Scenario Y cares about catching every positive → recall. F1 is useful when you care about both equally; named scenarios usually don't."},
  {q:"A teammate says \"F1 score is just a fancier accuracy — let's pick whichever looks better.\" When does F1 actually tell you something accuracy doesn't?",opts:["F1 only differs from accuracy when the dataset has more than 10 classes","On an imbalanced dataset, F1 stays low if precision <em>or</em> recall is low — accuracy can be high while the model misses every minority-class example. F1 forces both halves of the prediction to be good","F1 is always equal to accuracy because both range from 0 to 1","F1 only matters when computing ROC-AUC for medical or financial classifiers; for everything else accuracy is fine"],ans:1,explanation:"Accuracy on imbalanced data is dominated by the majority class — it can be 95%+ even when the model never predicts the rare class correctly. F1 combines precision and recall: if either is bad, F1 is bad. So a \"predict majority always\" model gets high accuracy but <strong>F1 = 0</strong> on the rare class — exactly the warning sign you need."},
  {q:"<strong>ROC and AUC.</strong> Most metrics so far (accuracy, precision, recall, F1) need you to <strong>commit to a threshold</strong> — usually 0.5 — to turn probabilities into class predictions. The <strong>ROC curve</strong> plots true positive rate against false positive rate as you sweep the threshold from 0 to 1, and the <strong>AUC</strong> (Area Under the Curve) summarises that into a single number between 0 and 1.<br><br>What does an AUC of <code>0.5</code> mean, and why is AUC useful <strong>beyond</strong> accuracy?",opts:["AUC = 0.5 means the model is exactly 50% accurate at the default threshold; AUC simply replaces accuracy with a fancier ranking-aware name and doesn't tell you anything new about the model","AUC = 0.5 means the model ranks positives and negatives no better than random — the floor. AUC is threshold-independent: it tells you how well-separated the model's scores are without committing to a specific cutoff. Useful when you don't know the right threshold yet, or when imbalance makes accuracy at a fixed threshold misleading","AUC = 0.5 means the model achieves perfect calibration — predictions are evenly distributed across all confidence levels","AUC = 0.5 means the model has memorised half the training set; AUC measures the generalisation gap rather than ranking quality"],ans:1,explanation:"AUC measures the probability that a random positive example gets a <em>higher</em> model score than a random negative one. <strong>0.5 = random ranking</strong> (chance level), <strong>1.0 = perfect ranking</strong>. Unlike accuracy — which depends on where you put the threshold — AUC summarises ranking quality across <strong>all</strong> thresholds at once. Especially useful when the right threshold isn't obvious (medical screening, fraud detection) or when classes are imbalanced."},
  {q:"Reading a snippet from <code>classification_report</code>:<pre class='language-python'><code class='language-python'>              precision    recall  f1-score   support\n   T-shirt       0.81       0.86      0.83       1000\n   Pullover      0.79       0.83      0.81       1000\n   Shirt         0.55       0.49      0.52       1000\n   Sneaker       0.94       0.96      0.95       1000\noverall acc                            0.83      4000</code></pre>Which class is the model struggling with most, and what's the immediate signal?",opts:["Sneaker — it's the easiest class so the model isn't really learning anything from it","T-shirt — its support is 1000, which is too small for the model to generalise reliably","Shirt — both precision (0.55) and recall (0.49) are far below the others; overall 83% accuracy hides this large per-class gap","Pullover — its F1 of 0.81 is below the overall accuracy of 0.83, so it must be the weakest class"],ans:2,explanation:"The overall 83% accuracy looks fine, but Shirt's precision (55%) and recall (49%) are <em>both</em> much lower than every other class. That's the per-class failure overall accuracy hides. In Fashion-MNIST this is a well-known issue — shirts and T-shirts share too many low-resolution pixels, and the model can't tell them apart without more discriminating features."},
  // == Section 4 ==
  {q:"A student splits Fashion-MNIST into train + test only and asks: \"Why bother with a third <em>validation</em> split? Why not train, then evaluate on test?\"",opts:["The validation set is only needed if you have less than 10,000 training examples to work with","Training fits the weights, but you also tune hyperparameters (learning rate, num filters, when to stop). If you tune those by checking the test set, the test accuracy stops being an honest measure of unseen-data performance — that's what the validation set is for","The three splits are a historical convention — modern PyTorch combines validation and test internally","Validation lets you train for more epochs; without it the optimiser converges too quickly and the test set never sees a fully-trained model"],ans:1,explanation:"The test set is the <strong>single, untouched audit</strong> of how the model performs on data it has never influenced. The moment you tune anything based on test accuracy, that number stops being trustworthy — you've leaked information into your model selection. The validation set is the throwaway feedback channel: tune it, peek at it, even overfit to it; the test set stays sealed until the end."},
  {q:"A student forgets to call <code>model.eval()</code> before the validation loop. Validation numbers come out <strong>noisy and inconsistent</strong> between runs even on identical inputs. Why?",opts:["Without <code>model.eval()</code>, gradients accumulate across the validation batches and corrupt the predictions in subsequent forward passes","Layers like Dropout and BatchNorm behave differently in training vs evaluation mode. In training mode they introduce randomness (Dropout) or use per-batch statistics (BatchNorm), making validation outputs vary. <code>model.eval()</code> switches them to deterministic eval-mode behaviour","<code>model.eval()</code> is what frees memory; without it the model runs out of GPU memory and produces random outputs","<code>model.eval()</code> is needed to compute the loss; otherwise PyTorch silently returns the wrong loss number"],ans:1,explanation:"<code>model.eval()</code> doesn't change weights or stop learning — it just flips a flag that layers like <code>nn.Dropout</code> and <code>nn.BatchNorm2d</code> read. In <strong>train</strong> mode Dropout randomly zeros activations and BatchNorm uses the current batch's statistics. In <strong>eval</strong> mode Dropout becomes a no-op and BatchNorm uses the running statistics it accumulated during training. Always call <code>model.eval()</code> before validation, then <code>model.train()</code> before going back to training."},
  {q:"Inside the validation loop the student wraps the forward pass in <code>torch.no_grad()</code>. What does this do, and what does it NOT do?",opts:["It changes the model's predictions to be slightly different from training-time predictions on the same input","It tells PyTorch to skip the bookkeeping needed for backprop, which saves memory and speeds up the forward pass. It does not change the model's predictions or affect Dropout/BatchNorm — those are controlled by <code>model.eval()</code>","It freezes the weights so they can't be updated by mistake during validation, even if <code>optimizer.step()</code> is accidentally called inside the loop","It applies dropout deterministically, so validation accuracy doesn't fluctuate between repeated runs on the same data"],ans:1,explanation:"<code>torch.no_grad()</code> and <code>model.eval()</code> are independent and serve different purposes. <code>model.eval()</code> switches Dropout/BatchNorm to eval-mode behaviour. <code>torch.no_grad()</code> tells PyTorch \"I won't call <code>.backward()</code> on this — don't build the autograd graph,\" which cuts memory use roughly in half and speeds up forward passes. Both belong in a validation loop, but they fix different problems."},
  // == Section 5 ==
  {q:"During training of a Fashion-MNIST CNN, you observe:<br>• <strong>Train loss</strong> keeps decreasing every epoch<br>• <strong>Train accuracy</strong> has plateaued at 92% for the last 5 epochs<br><br>What is the model doing?",opts:["The model has stopped learning — restart training with a different random seed and re-initialised weights","The optimizer is broken — switch from Adam to SGD and the loss-vs-accuracy disagreement should go away","Cross-entropy keeps going down even when no predictions flip — the model is becoming more confident on the examples it already gets right (e.g., probability of the correct class drifting from 0.7 → 0.95). Loss reflects confidence, not just correctness","The validation set is too easy — the model has memorised it perfectly, so loss can keep dropping while accuracy plateaus completely"],ans:2,explanation:"Accuracy is binary per example (right or wrong); loss measures how confident the prediction was. A model can move from <code>p_correct = 0.7</code> to <code>p_correct = 0.95</code> on a thousand correct examples — every prediction stays right (no accuracy change), but the loss on each one goes from <code>−log(0.7) ≈ 0.36</code> to <code>−log(0.95) ≈ 0.05</code>. Big loss drop, no accuracy change. Don't use loss alone to judge whether the model is \"still improving.\""},
  {q:"Late in training you see this pattern:<br>• <strong>Val accuracy</strong> is stable at ~85% over the last few epochs<br>• <strong>Val loss</strong> is <strong>slowly creeping upward</strong> at the same time<br><br>What's happening, and why does accuracy alone miss it?",opts:["Validation accuracy bounces around naturally between epochs, so val loss going up means almost nothing — just keep training until accuracy actually drops","The optimizer is broken — switch optimizers and the gap between val loss and val accuracy should disappear over the next few epochs","The model is becoming over-confidently wrong on the examples it gets wrong (probability assigned to the <em>wrong</em> class is creeping upward). Accuracy doesn't notice because the predictions haven't flipped — yet. This is an early warning of overfitting that pure accuracy hides","Val loss going up always means the learning rate is too high — divide it by 10 and the val loss should resume decreasing"],ans:2,explanation:"Val loss creeping up while accuracy stays flat usually means the model is becoming <em>more confident</em> on the cases it gets wrong — <code>p_wrong</code> is rising. Accuracy doesn't detect this because no decision boundary has flipped. But it's the earliest fingerprint of overfitting, well before val accuracy itself starts dropping. Watching loss alongside accuracy lets you stop earlier."},
  {q:"Your Fashion-MNIST model's confusion matrix shows <strong>shirts mostly classified as T-shirts</strong>. A student suggests fixing this by \"adding more conv layers to give the model more capacity.\" Is this the right diagnosis?",opts:["Yes — more capacity always helps, especially for the harder classes in any dataset","Yes — adding two more layers will let the network spot subtle texture differences between shirts and T-shirts at the collar and shoulder regions","No — the issue is that shirts and T-shirts genuinely look almost identical at 28×28 grayscale. More capacity won't manufacture information that isn't in the pixels. Better fixes: data augmentation, collecting higher-resolution images, or adding domain-specific features","No — the right fix is to remove the confusion matrix step and trust overall accuracy as the single reported number"],ans:2,explanation:"Capacity helps when the model is too simple to fit the patterns in the data. It does NOT help when the data itself doesn't contain enough information to distinguish two classes. At 28×28 grayscale, the difference between a shirt and a T-shirt often comes down to a few pixels at the collar — that's a <em>data</em> limitation, not a <em>model</em> limitation. Always look at the data before adding parameters."},
  {q:"A student trains a model, tunes hyperparameters by repeatedly checking <strong>test set</strong> accuracy, and reports the highest test accuracy as the final result. What's wrong, and what should they have done?",opts:["Nothing wrong — checking test accuracy at every hyperparameter choice is the standard way to find the best configuration for production","They should have averaged training accuracy and test accuracy to get a more robust single number for the final report","They tuned on the test set, which means the test accuracy is now biased upward — the model has been selected <em>because</em> it does well on this specific test set. The honest workflow: tune hyperparameters on a held-out validation set, then evaluate the chosen model on the test set once at the end","The mistake is using accuracy at all — they should have used F1 instead so the imbalance doesn't bias the final number"],ans:2,explanation:"\"Test set hygiene\" sounds dry but matters: every time you make a decision based on test accuracy, you've leaked information into the model. After enough peeks the test number stops representing unseen-data performance. Validation set: tune freely. Test set: open it once, report the number, never tune against it again."},
  {q:"<strong>K-fold cross-validation</strong> is a more careful evaluation method: instead of a single train/val split, you divide the data into <strong>k equal folds</strong> (commonly k=5 or k=10), train <strong>k separate models</strong> (each one leaves a different fold out for validation), and <strong>average the k validation scores</strong> as the final number. Every example ends up in the validation set exactly once.<br><br>What is the <strong>main reason</strong> to use k-fold over a single train/val split?",opts:["k-fold automatically tunes hyperparameters for you — the best fold's hyperparameters are picked as the final configuration","A single split's score is noisy — depending on which examples landed in val, you can be lucky or unlucky by several percentage points. Averaging across k folds gives a much more reliable estimate of how the model truly performs, with less dependence on the specific split you happened to pick","k-fold is required by sklearn to compute precision and recall correctly — without it, <code>classification_report</code> produces biased numbers","k-fold runs k models in parallel, so it's strictly faster than training a single model on the full dataset"],ans:1,explanation:"The <strong>main</strong> reason for k-fold is reducing the variance of your performance estimate — a single split might be lucky or unlucky, but averaging k of them gives you a number you can trust. This matters most when <strong>data is scarce</strong> (a few hundred to a few thousand examples), because that's when split-to-split variance is large; with Fashion-MNIST's 60k+ examples a single fixed split is already pretty stable. The cost is real (k× the training time), so use k-fold when a single number can't be trusted, and stick with a single fixed split when it can."}
];

let currentQ=0,answers=new Array(questions.length).fill(null),userName="",userGithub="";
function startQuiz(){userName=document.getElementById("userName").value.trim();userGithub=document.getElementById("userGithub").value.trim();if(!userName){alert("Please enter your name.");return;}document.getElementById("startScreen").classList.add("hidden");document.getElementById("quizScreen").classList.remove("hidden");quizActive=true;renderQuestion();}
let quizActive=false;
document.getElementById("userName").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("userGithub").focus();}});
document.getElementById("userGithub").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();startQuiz();}});
document.addEventListener("keydown",function(e){if(!quizActive)return;if(e.key==="Enter"&&answers[currentQ]!==null){e.preventDefault();if(currentQ===questions.length-1)submitQuiz();else nextQuestion();}});
function getSection(idx){for(const s of sections){if(idx>=s.range[0]&&idx<s.range[1])return s.title;}return"";}
function renderQuestion(){const q=questions[currentQ],letters=["A","B","C","D"],card=document.getElementById("questionCard");let html=`<div class="section-badge">${getSection(currentQ)}</div><h2>Q${currentQ+1}. ${q.q}</h2><div class="options">`;q.opts.forEach((opt,i)=>{const sel=answers[currentQ]===i?" selected":"";html+=`<div class="option${sel}" onclick="selectOption(${i})"><span class="letter">${letters[i]}</span><span class="text">${opt}</span></div>`;});html+=`</div>`;card.innerHTML=html;if(window.Prism){Prism.highlightAllUnder(card);}if(window.Prism){Prism.highlightAllUnder(card);}const nav=document.getElementById("qNav");let navHtml="";for(let n=0;n<questions.length;n++){let cls="q-nav-btn";if(n===currentQ)cls+=" active";else if(answers[n]!==null)cls+=" answered";navHtml+=`<button class="${cls}" onclick="jumpTo(${n})">${n+1}</button>`;}nav.innerHTML=navHtml;document.getElementById("progressLabel").textContent=`Question ${currentQ+1} of ${questions.length}`;document.getElementById("sectionLabel").textContent=getSection(currentQ);document.getElementById("progressFill").style.width=((currentQ+1)/questions.length*100)+"%";document.getElementById("prevBtn").style.visibility=currentQ===0?"hidden":"visible";const nextBtn=document.getElementById("nextBtn");if(currentQ===questions.length-1){nextBtn.textContent="Submit Quiz";nextBtn.onclick=submitQuiz;}else{nextBtn.textContent="Next";nextBtn.onclick=nextQuestion;}}
function selectOption(idx){answers[currentQ]=idx;renderQuestion();}function jumpTo(idx){currentQ=idx;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}function nextQuestion(){if(answers[currentQ]===null){alert("Please select an answer before continuing.");return;}if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function submitQuiz(){if(answers[currentQ]===null){alert("Please select an answer before submitting.");return;}const unanswered=answers.findIndex(a=>a===null);if(unanswered!==-1){alert(`Please answer Question ${unanswered+1} before submitting.`);currentQ=unanswered;renderQuestion();return;}if(!confirm("Submit your quiz? You won't be able to change answers."))return;quizActive=false;const results=questions.map((q,i)=>answers[i]===q.ans);const score=results.filter(Boolean).length;sendResults(results,score);showResults(results,score);}
function sendResults(results,score){if(SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){console.warn("No Apps Script URL configured.");return;}fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({quizName:QUIZ_NAME,name:userName,github:userGithub,results:results})}).catch(err=>console.error("Failed:",err));}
function showResults(results,score){document.getElementById("quizScreen").classList.add("hidden");const container=document.getElementById("resultsScreen");container.classList.remove("hidden");const pct=Math.round((score/questions.length)*100),tier=pct>=80?"high":pct>=50?"mid":"low";const message=pct>=80?"Excellent work!":pct>=50?"Good effort — review the topics you missed.":"Keep studying — review the explanations below.";let html=`<div class="score-circle score-${tier}"><span class="number">${score}/${questions.length}</span><span class="label">${pct}%</span></div><h1>${message}</h1><p class="results-subtitle">${userName}${userGithub?" &bull; @"+userGithub:""}</p><div class="review-list">`;const letters=["A","B","C","D"];questions.forEach((q,i)=>{const correct=results[i];const cls=correct?"correct":"incorrect";const status=correct?"✓ Correct":"✗ Incorrect";html+=`<div class="review-item ${cls}"><div class="q-title">Q${i+1}. ${q.q}</div><div class="status-badge ${cls}">${status}</div><div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} — ${q.opts[answers[i]]}</div>`;if(!correct)html+=`<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} — ${q.opts[q.ans]}</div>`;html+=`<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div></div>`;});html+=`</div>`;container.innerHTML=html;if(window.Prism){Prism.highlightAllUnder(container);}window.scrollTo({top:0,behavior:"smooth"});}
</script>
