<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME = "Python Class 3 \u2014 Code Reading";

const sections = [
  { title: "Section 1: NumPy Arrays & Indexing", range: [0, 5] },
  { title: "Section 2: NumPy Operations", range: [5, 10] },
  { title: "Section 3: Pandas DataFrames", range: [10, 15] },
  { title: "Section 4: Pandas Cleaning & Aggregation", range: [15, 20] }
];

const questions = [
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([1, 2, 3])\na[0] = 7.9\nprint(a)</code>",
    opts: [
      "[7.9 2.  3. ] — the array converts to float to hold the decimal value",
      "[7 2 3] — the array is int64, so 7.9 is silently truncated to 7 with no warning",
      "Error — you can't assign a float to an integer array; types must match exactly",
      "[8 2 3] — NumPy rounds 7.9 to the nearest integer when assigning to an int array"
    ],
    ans: 1,
    explanation: "np.array([1, 2, 3]) creates an int64 array. When you assign 7.9 to it, NumPy doesn't convert the array to float or raise an error — it silently truncates 7.9 to 7 (drops the decimal, no rounding). This is a common source of subtle bugs: you think you stored 7.9 but the array holds 7. To avoid this, create the array as float from the start: np.array([1.0, 2.0, 3.0]) or np.array([1, 2, 3], dtype=float)."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([1, 2, 3, 4, 5])\nb = a[1:4]\nb[0] = 99\nprint(a)</code>",
    opts: [
      "[1 2 3 4 5] — b is an independent copy, so changing b doesn't affect a",
      "[1 99 3 4 5] — slicing creates a VIEW that shares memory, so modifying b changes a",
      "[99 2 3 4 5] — b[0] maps to a[0], not a[1], because the view resets indexing to 0",
      "Error — you can't assign to a slice of a NumPy array once it's been created"
    ],
    ans: 1,
    explanation: "In NumPy, basic slicing (a[1:4]) returns a VIEW — not a copy. The view b shares the same memory as a, just looking at elements 1, 2, 3. When you set b[0] = 99, you're actually setting a[1] = 99 (since b[0] points to a[1]). This is different from Python lists, where slicing always copies. If you need an independent copy, use b = a[1:4].copy(). Understanding views vs copies is critical for avoiding subtle bugs in NumPy."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([[1, 2, 3], [4, 5, 6]])\nprint(a.sum(axis=1))</code>",
    opts: [
      "[6 15] — sums across each row: 1+2+3=6, 4+5+6=15",
      "[5 7 9] — sums down each column: 1+4=5, 2+5=7, 3+6=9",
      "21 — the total sum of all elements in the array",
      "[[6] [15]] — same values but with an extra dimension preserved"
    ],
    ans: 0,
    explanation: "The axis parameter tells NumPy which dimension to collapse. axis=1 means \"collapse along dimension 1 (columns)\" — so for each row, sum across all columns: row 0: 1+2+3=6, row 1: 4+5+6=15, giving [6, 15] with shape (2,). axis=0 would collapse rows instead, summing down columns to give [5, 7, 9] with shape (3,). The trick: the axis you specify is the one that DISAPPEARS from the result shape. (2,3) with axis=1 → dim 1 disappears → shape (2,)."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([1, 2, 3])\nb = np.array([True, False, True])\nprint(a[b])</code>",
    opts: [
      "[True False True] — boolean arrays are returned as-is when used for indexing",
      "[1 3] — boolean indexing selects elements where the mask is True (positions 0 and 2)",
      "[1 0 3] — False positions become 0 and True positions keep their value",
      "Error — you can't use a boolean array to index into a numeric array"
    ],
    ans: 1,
    explanation: "Boolean indexing is one of NumPy's most powerful features. When you index with a boolean array, NumPy returns only the elements where the mask is True. Here, b = [True, False, True], so a[b] picks elements at positions 0 and 2: [1, 3]. This is how expressions like a[a > 2] work — a > 2 creates [False, False, True], which selects only the value 3. Boolean indexing always returns a copy (not a view), unlike basic slicing."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([10, 20, 30])\nb = np.array([[1], [2], [3]])\nprint((a + b).shape)</code>",
    opts: [
      "Error — you can't add arrays with shapes (3,) and (3, 1) because they're incompatible",
      "(3, 3) — NumPy broadcasts: a becomes a row repeated 3 times, b becomes a column repeated 3 times",
      "(3,) — the result matches the 1D array's shape, ignoring the 2D array's extra dimension",
      "(3, 1) — the result matches b's shape because it has more dimensions"
    ],
    ans: 1,
    explanation: "Broadcasting in action. a has shape (3,) and b has shape (3, 1). NumPy compares from the right: 3 matches 1 (broadcast the 1), then the missing dimension is added to a → effectively (1, 3). So a is \"stretched\" to (3, 3) by repeating the row, and b is stretched to (3, 3) by repeating the column. Result: [[11, 21, 31], [12, 22, 32], [13, 23, 33]] with shape (3, 3). Broadcasting avoids explicitly creating the full (3,3) arrays — NumPy does it virtually."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([1, 2, 3])\nb = a * 3\na[0] = 99\nprint(b[0])</code>",
    opts: [
      "99 — b shares memory with a (like slicing), so changing a changes b too",
      "3 — b = a * 3 creates a NEW array (not a view), so b is independent of a after creation",
      "297 — b[0] was 3, but since it tracks a, it recalculates as 99 * 3 = 297",
      "Error — modifying a invalidates any arrays derived from it"
    ],
    ans: 1,
    explanation: "Arithmetic operations like a * 3 always create a NEW array — they don't return a view. So b = [3, 6, 9] is independent of a. Changing a[0] to 99 has no effect on b. This is different from slicing (b = a[1:4]) which returns a view sharing the same memory. The rule: slicing → view (shared memory), arithmetic → new array (independent copy). This distinction matters a lot when debugging unexpected value changes."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([10, 20, 30, 40, 50])\nmask = a &gt; 25\nprint(a[mask])</code>",
    opts: [
      "[True True True]",
      "[30 40 50]",
      "[10 20]",
      "[False False True True True]"
    ],
    ans: 1,
    explanation: "a > 25 → [False, False, True, True, True]. a[mask] returns elements where True: [30, 40, 50]."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([[1, 2], [3, 4]])\nprint(a.sum(axis=0))</code>",
    opts: [
      "[4 6]",
      "[3 7]",
      "10",
      "[[1 2] [3 4]]"
    ],
    ans: 0,
    explanation: "axis=0 means \"collapse along dimension 0 (rows)\" — for each column, sum all the rows together. Column 0: 1+3=4. Column 1: 2+4=6. Result: [4, 6] with shape (2,). If you used axis=1 instead, you'd collapse columns: row 0: 1+2=3, row 1: 3+4=7 → [3, 7]. With no axis, you'd get 10 (total sum). The trick to remember: the axis you specify is the dimension that disappears from the output shape."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([3, 1, 4, 1, 5])\nidx = np.argsort(a)\nprint(idx)</code>",
    opts: [
      "[1 1 3 4 5]",
      "[1 3 0 2 4]",
      "[5 4 3 1 1]",
      "[0 1 2 3 4]"
    ],
    ans: 1,
    explanation: "argsort returns indices that would sort the array. Sorted: 1(idx1), 1(idx3), 3(idx0), 4(idx2), 5(idx4) → [1, 3, 0, 2, 4]."
  },
  {
    q: "What does this code print?<br><br><code>import numpy as np\na = np.array([1, 2, 3])\nb = np.array([10, 20, 30])\nprint(np.dot(a, b))</code>",
    opts: [
      "[10 40 90]",
      "140",
      "[11 22 33]",
      "Error: different shapes"
    ],
    ans: 1,
    explanation: "Dot product of 1D arrays: 1*10 + 2*20 + 3*30 = 140 (a scalar). For element-wise, use a * b → [10, 40, 90]."
  },
  {
    q: "What does this code print?<br><br><code>import pandas as pd\ndf = pd.DataFrame({&#39;x&#39;: [10, 20, 30]})\ndf2 = df\ndf2[&#39;y&#39;] = [4, 5, 6]\nprint(df.columns.tolist())</code>",
    opts: [
      "['x'] — df2 is a separate copy, so adding a column to df2 doesn't affect df",
      "['x', 'y'] — df2 = df doesn't copy the DataFrame; both variables point to the same object",
      "Error — you can't add columns to df2 because it was created by assignment, not pd.DataFrame()",
      "['y'] — the new column replaces the existing one because df2 and df share memory"
    ],
    ans: 1,
    explanation: "Just like Python lists, df2 = df does NOT copy the DataFrame — both variables reference the same object. Adding column 'y' to df2 also adds it to df, because they ARE the same DataFrame. This catches many beginners: they think they're working on a safe copy but they're modifying the original. To create an independent copy, use df2 = df.copy(). This is the same aliasing behavior as Python lists (a = [1,2]; b = a; b.append(3) changes a too)."
  },
  {
    q: "What does this code print?<br><br><code>import pandas as pd\ndf = pd.DataFrame({&#39;a&#39;: [10, 20, 30]}, index=[5, 10, 15])\nprint(df.iloc[0][&#39;a&#39;], df.loc[5][&#39;a&#39;])</code>",
    opts: [
      "10 10 — both return the first row's value, just accessed differently (by position vs by label)",
      "5 10 — iloc returns the index label, loc returns the value",
      "Error — you can't use both iloc and loc on the same DataFrame",
      "10 Error — loc[5] fails because 5 is a position, not a label"
    ],
    ans: 0,
    explanation: "This demonstrates the critical difference between iloc (integer position) and loc (label). iloc[0] means \"first row by position\" → value 10. loc[5] means \"row with label 5\" → also value 10 (because the first row has index label 5). They give the same result here by coincidence. But iloc[1] would give 20 (second row by position) while loc[10] would also give 20 (row labeled 10). The confusion gets dangerous when index labels are integers that don't match positions — which is exactly what this example tests."
  },
  {
    q: "What does this code print?<br><br><code>import pandas as pd\ndf = pd.DataFrame({&#39;x&#39;: [10, 20, 30, 40]}, index=[&#39;a&#39;, &#39;b&#39;, &#39;c&#39;, &#39;d&#39;])\nprint(df.loc[&#39;b&#39;:&#39;d&#39;])</code>",
    opts: [
      "x values 20, 30",
      "x values 20, 30, 40",
      "x values 10, 20, 30",
      "Error: can't slice with strings"
    ],
    ans: 1,
    explanation: ".loc slicing is inclusive on both ends. 'b':'d' includes rows 'b', 'c', 'd' → values 20, 30, 40. (.iloc would exclude the end.)"
  },
  {
    q: "What does this code print?<br><br><code>import pandas as pd\ndf = pd.DataFrame({&#39;a&#39;: [1, 2, 3], &#39;b&#39;: [4, 5, 6]})\nresult = df[df[&#39;a&#39;] &gt; 1]\nprint(len(result))</code>",
    opts: [
      "1",
      "2",
      "3",
      "Error"
    ],
    ans: 1,
    explanation: "df['a'] > 1 → [False, True, True]. Keeps rows where 'a' is 2 and 3 → 2 rows."
  },
  {
    q: "What does this code print?<br><br><code>import pandas as pd\nimport numpy as np\ndf = pd.DataFrame({&#39;val&#39;: [1.0, np.nan, 3.0, np.nan]})\nprint(df[&#39;val&#39;].mean())</code>",
    opts: [
      "nan — any NaN in the data makes the entire mean calculation return NaN",

let currentQ=0,answers=new Array(questions.length).fill(null),userName="",userGithub="";
function startQuiz(){userName=document.getElementById("userName").value.trim();userGithub=document.getElementById("userGithub").value.trim();if(!userName){alert("Please enter your name.");return;}document.getElementById("startScreen").classList.add("hidden");document.getElementById("quizScreen").classList.remove("hidden");quizActive=true;renderQuestion();}
let quizActive=false;
document.getElementById("userName").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("userGithub").focus();}});
document.getElementById("userGithub").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();startQuiz();}});
document.addEventListener("keydown",function(e){if(!quizActive)return;if(e.key==="Enter"&&answers[currentQ]!==null){e.preventDefault();if(currentQ===questions.length-1)submitQuiz();else nextQuestion();}});
function getSection(idx){for(const s of sections){if(idx>=s.range[0]&&idx<s.range[1])return s.title;}return"";}
function renderQuestion(){const q=questions[currentQ],letters=["A","B","C","D"],card=document.getElementById("questionCard");let html=`<div class="section-badge">${getSection(currentQ)}</div><h2>Q${currentQ+1}. ${q.q}</h2><div class="options">`;q.opts.forEach((opt,i)=>{const sel=answers[currentQ]===i?" selected":"";html+=`<div class="option${sel}" onclick="selectOption(${i})"><span class="letter">${letters[i]}</span><span class="text">${opt}</span></div>`;});html+=`</div>`;card.innerHTML=html;card.querySelectorAll('code').forEach(el=>el.classList.add('language-python'));if(typeof Prism!=='undefined')Prism.highlightAllUnder(card);const nav=document.getElementById("qNav");let navHtml="";for(let n=0;n<questions.length;n++){let cls="q-nav-btn";if(n===currentQ)cls+=" active";else if(answers[n]!==null)cls+=" answered";navHtml+=`<button class="${cls}" onclick="jumpTo(${n})">${n+1}</button>`;}nav.innerHTML=navHtml;document.getElementById("progressLabel").textContent=`Question ${currentQ+1} of ${questions.length}`;document.getElementById("sectionLabel").textContent=getSection(currentQ);document.getElementById("progressFill").style.width=((currentQ+1)/questions.length*100)+"%";document.getElementById("prevBtn").style.visibility=currentQ===0?"hidden":"visible";const nextBtn=document.getElementById("nextBtn");if(currentQ===questions.length-1){nextBtn.textContent="Submit Quiz";nextBtn.onclick=submitQuiz;}else{nextBtn.textContent="Next";nextBtn.onclick=nextQuestion;}}
function selectOption(idx){answers[currentQ]=idx;renderQuestion();}
function jumpTo(idx){currentQ=idx;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}
function nextQuestion(){if(answers[currentQ]===null){alert("Please select an answer before continuing.");return;}if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function submitQuiz(){if(answers[currentQ]===null){alert("Please select an answer before submitting.");return;}const unanswered=answers.findIndex(a=>a===null);if(unanswered!==-1){alert(`Please answer Question ${unanswered+1} before submitting.`);currentQ=unanswered;renderQuestion();return;}if(!confirm("Submit your quiz? You won't be able to change answers."))return;quizActive=false;const results=questions.map((q,i)=>answers[i]===q.ans);const score=results.filter(Boolean).length;sendResults(results,score);showResults(results,score);}
function sendResults(results,score){if(SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){console.warn("No Apps Script URL configured.");return;}fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({quizName:QUIZ_NAME,name:userName,github:userGithub,results:results})}).catch(err=>console.error("Failed:",err));}
function showResults(results,score){document.getElementById("quizScreen").classList.add("hidden");const container=document.getElementById("resultsScreen");container.classList.remove("hidden");const pct=Math.round((score/questions.length)*100),tier=pct>=80?"high":pct>=50?"mid":"low";const message=pct>=80?"Excellent work!":pct>=50?"Good effort \u2014 review the topics you missed.":"Keep studying \u2014 review the explanations below.";let html=`<div class="score-circle score-${tier}"><span class="number">${score}/${questions.length}</span><span class="label">${pct}%</span></div><h1>${message}</h1><p class="results-subtitle">${userName}${userGithub?" &bull; @"+userGithub:""}</p><div class="review-list">`;const letters=["A","B","C","D"];questions.forEach((q,i)=>{const correct=results[i];const cls=correct?"correct":"incorrect";const status=correct?"\u2713 Correct":"\u2717 Incorrect";html+=`<div class="review-item ${cls}"><div class="q-title">Q${i+1}. ${q.q}</div><div class="status-badge ${cls}">${status}</div><div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} \u2014 ${q.opts[answers[i]]}</div>`;if(!correct)html+=`<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} \u2014 ${q.opts[q.ans]}</div>`;html+=`<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div></div>`;});html+=`</div>`;container.innerHTML=html;container.querySelectorAll('code').forEach(el=>el.classList.add('language-python'));if(typeof Prism!=='undefined')Prism.highlightAllUnder(container);window.scrollTo({top:0,behavior:"smooth"});}
