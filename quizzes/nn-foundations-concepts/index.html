<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxJIg5CYXWJKY-Uuoi9H0Nvnl4wlWwAAAQ4aYQd1FX7iIBmMqj6f9ksXEj-LTtJK8hlRg/exec";
const QUIZ_NAME="NN Foundations & PyTorch \u2014 Conceptual";

const sections=[
  {title:"Section 1: Tensors \u2014 Shape, Type & Device",range:[0,5]},
  {title:"Section 2: Operations & Architecture",range:[5,10]},
  {title:"Section 3: Autograd & Gradients",range:[10,15]},
  {title:"Section 4: Training Loop Gotchas",range:[15,20]},
  {title:"Section 5: Activations & Model Design",range:[20,25]}
];

const questions=[
  // == Section 1 ==
  {q:"A model outputs a tensor of shape (64, 10) during a classification task. What do the two dimensions represent?",opts:["64 features extracted from the input, with 10 samples in the current batch","A 64\u00d710 weight matrix stored inside the model\u2019s last linear layer","64 samples in the batch, each with a score for 10 possible classes","10 training epochs completed so far, with 64 gradient updates per epoch"],ans:2,explanation:"In PyTorch, the output of a classification model has shape (batch_size, num_classes). Here, 64 is the batch size \u2014 the number of samples being processed together in one forward pass. 10 is the number of classes \u2014 each sample gets a score for every possible class. The batch dimension always comes first in PyTorch. So if you\u2019re classifying images into 10 categories and send 64 images through the model at once, you get back a (64, 10) tensor."},
  {q:"You define a model with nn.Linear(10, 3) as the first layer. You pass in a tensor of shape (32, 5). You get:<br><br><em>RuntimeError: mat1 and mat2 shapes cannot be multiplied (32x5 and 10x3)</em><br><br>What\u2019s wrong and how do you fix it?",opts:["The batch size 32 is too large for the model \u2014 reduce it to match the layer size of 10","Your input has 5 features but the first layer expects 10 features \u2014 either reshape your data to have 10 features or change the layer to nn.Linear(5, 3)","The error is caused by the learning rate being too high, which corrupted the weight matrix dimensions","You need to transpose your input from (32, 5) to (5, 32) before passing it to the model"],ans:1,explanation:"nn.Linear(10, 3) means: \u2018I expect 10 input features and will output 3 features.\u2019 Internally it does: input @ weights.T, which is (32, 5) @ (10, 3) \u2014 but for matrix multiplication the inner dimensions must match: 5 \u2260 10, so it fails. The fix: either change your data to have 10 features, or change the layer to nn.Linear(5, 3) so it matches your actual data. The batch size (32) is never the problem here \u2014 batch size can be anything."},
  {q:"You want to plot model predictions using matplotlib, but output.numpy() throws an error. The output tensor has requires_grad=True. How do you fix this?",opts:["Call output.float().numpy() \u2014 the error is about data type, not gradients","Call output.detach().numpy() \u2014 detach disconnects the tensor from the computation graph so NumPy can read it","Call output.cpu().numpy() \u2014 the error is because the tensor is on GPU and NumPy only works on CPU","Call output.clone().numpy() \u2014 clone creates a copy that NumPy can safely convert"],ans:1,explanation:"When a tensor is connected to the computation graph (requires_grad=True or produced by such a tensor), PyTorch won\u2019t let you convert to NumPy. Why? Because NumPy can\u2019t track gradients, and allowing it could silently break backpropagation. The fix is output.detach().numpy(). detach() creates a new tensor that shares the same data but is disconnected from the graph. If the tensor is also on GPU, you\u2019d need output.detach().cpu().numpy()."},
  {q:"What makes PyTorch tensors essential for deep learning, compared to NumPy arrays which also support fast vectorized math?",opts:["Tensors are stored in a compressed format that uses 10\u00d7 less memory than equivalent NumPy arrays","Tensors support autograd (automatic gradient computation) and GPU acceleration \u2014 NumPy supports neither, making backpropagation impossible with NumPy alone","Tensors enforce strict type checking at creation, preventing subtle numerical bugs that NumPy arrays allow","Tensors are limited to 4 dimensions, which forces organized data structures that NumPy\u2019s unlimited nesting doesn\u2019t"],ans:1,explanation:"NumPy and PyTorch have nearly identical APIs for forward computation \u2014 .sum(), .mean(), slicing, broadcasting all work the same. But training a neural network needs two things NumPy doesn\u2019t have: (1) autograd \u2014 automatically computing the derivative of the loss with respect to every parameter (potentially millions) using the chain rule, and (2) GPU acceleration \u2014 running these matrix operations on thousands of GPU cores for practical training speed. That\u2019s why PyTorch exists: it\u2019s NumPy with superpowers for learning."},
  {q:"You see: RuntimeError: expected scalar type Float but found Long. What\u2019s the issue and how do you fix it?",opts:["Your model weights are corrupt and need to be reinitialized from scratch with fresh random values","Your input data is integer type (Long/int64) but neural network layers require float (Float/float32) \u2014 convert with x = x.float() before passing to the model","Your loss function doesn\u2019t support the number of output classes in your dataset \u2014 switch to a different loss","The learning rate was accidentally stored as a Long integer instead of a floating point number"],ans:1,explanation:"This is one of the most common PyTorch errors. Neural network layers (nn.Linear, nn.Conv2d, etc.) operate on float32 tensors. But data loaded from files or created from Python integers like torch.tensor([1, 2, 3]) defaults to int64 (Long). The model can\u2019t do float math on integer data. The fix is simple: x = x.float() or x = x.to(torch.float32) before passing to the model. Always check x.dtype when you hit unexpected errors."},
  // == Section 2 ==
  {q:"A student computes loss = predictions * targets to measure model error. Why doesn\u2019t this work as a loss function?",opts:["Element-wise multiplication gives prediction \u00d7 target per element \u2014 that doesn\u2019t measure error. A real loss like MSE computes (prediction - target)\u00b2 averaged over all elements, giving a single number that gradient descent can minimize.","It does work \u2014 element-wise multiplication is a standard loss function commonly used for regression tasks in production systems","The only issue is speed \u2014 * is slower than nn.MSELoss because it doesn\u2019t use GPU-optimized computational kernels","It works for computing gradients, but won\u2019t work for evaluation because the * operator doesn\u2019t support .backward()"],ans:0,explanation:"Think about what predictions * targets gives: if prediction = 5 and target = 3, you get 15. But that doesn\u2019t tell you how wrong the prediction is! MSELoss computes (5-3)\u00b2 = 4, which directly measures the error gap. More importantly, the MSE gradient pushes each prediction toward its target (reduce the gap), while the gradient of multiplication pushes predictions in unpredictable directions. A loss function must measure \u2018how wrong am I\u2019 as a single number, not \u2018what\u2019s the product.\u2019"},
  {q:"You convert a NumPy array with t = torch.from_numpy(arr), then modify arr[0] = 999. What happens to the tensor?",opts:["The tensor keeps its original value \u2014 from_numpy makes an independent deep copy of the data","The tensor\u2019s first element also becomes 999 \u2014 from_numpy shares the same underlying memory, so changing one changes the other","The tensor is invalidated and raises an error on next access because modifying shared data corrupts it","PyTorch detects the external change and marks the tensor as stale, requiring a refresh call"],ans:1,explanation:"torch.from_numpy() does NOT copy data \u2014 the tensor and the NumPy array point to the exact same memory location. This is efficient (no copying) but can cause subtle bugs: modify the NumPy array and your tensor silently changes too. If you need an independent copy that won\u2019t be affected by changes to the original, use torch.tensor(arr) instead \u2014 that always copies. This shared-memory behavior is important to know when debugging unexpected value changes."},
  {q:"Your data has shape (100, 20). You pass it through nn.Linear(20, 8) then nn.Linear(8, 3). What\u2019s the final output shape?",opts:["(100, 20) \u2014 the output shape always matches the input shape regardless of what layers you use","(100, 3) \u2014 each Linear layer transforms the feature dimension (last axis) while the batch size (first axis) passes through unchanged","(3, 100) \u2014 the layers transpose the data as they transform it, swapping rows and columns","(8, 3) \u2014 the output shape matches the last two layers\u2019 dimensions combined"],ans:1,explanation:"Follow the shapes step by step: (100, 20) \u2192 Linear(20, 8) \u2192 (100, 8) \u2192 Linear(8, 3) \u2192 (100, 3). Each nn.Linear layer transforms the last dimension (the features). The first dimension (batch size = 100) always passes through unchanged \u2014 the model processes all 100 samples simultaneously. This is why the first layer\u2019s in_features (20) must match your data\u2019s feature count, and each subsequent layer\u2019s in_features must match the previous layer\u2019s out_features."},
  {q:"Why must nn.Linear(20, 8)\u2019s first argument (20) match the previous layer\u2019s output size?",opts:["It\u2019s an arbitrary convention that PyTorch enforces for consistency but could be relaxed in future versions","Because nn.Linear performs matrix multiplication internally: (batch, in_features) @ (in_features, out_features) \u2014 the inner dimensions must match or matrix math fails","Because each layer needs the exact same amount of GPU memory as the layer before it for efficient computation","So the learning rate can be applied uniformly and proportionally across all parameters in consecutive layers"],ans:1,explanation:"nn.Linear(20, 8) stores a weight matrix of shape (8, 20). During the forward pass, it computes: x @ W.T + bias. For this matrix multiplication to work, x\u2019s last dimension must equal W.T\u2019s first dimension \u2014 both must be 20. If the previous layer outputs 12 features and you feed that into Linear(20, 8), you get (batch, 12) @ (20, 8) which fails because 12 \u2260 20. This is exactly the RuntimeError from Q2. Matching layer dimensions is like connecting pipes \u2014 the output diameter of one must match the input diameter of the next."},
  {q:"What does torch.no_grad() actually do, and why should you use it during inference?",opts:["It deletes all stored gradients from model parameters to free up GPU memory after training is complete","It temporarily stops PyTorch from building the computation graph \u2014 saving memory and making inference faster since you don\u2019t need gradients for predictions","It sets all parameter gradients to zero, replacing the need for optimizer.zero_grad() in the training loop","It permanently freezes model weights so they can\u2019t be updated, even if .backward() is accidentally called later"],ans:1,explanation:"During training, PyTorch records every operation in a computation graph so backward() can compute gradients. This takes extra memory and time. During inference (making predictions), you don\u2019t need gradients \u2014 you\u2019re just running data forward through the model. torch.no_grad() tells PyTorch to skip building the graph entirely: no extra memory for intermediate values, and faster execution. Important: don\u2019t confuse it with optimizer.zero_grad() (which clears .grad values between training steps) or requires_grad_(False) (which permanently disables tracking on a specific tensor)."},
  // == Section 3 ==
  {q:"The gradient of the loss with respect to a weight is -0.5. What should the optimizer do with this weight?",opts:["Set the weight to exactly -0.5, since the gradient tells you the optimal target value for this weight","Decrease the weight by 0.5 because the gradient is negative, which indicates the weight is currently too large","Increase the weight \u2014 a negative gradient means increasing this weight would decrease the loss, which is what we want","Keep the weight unchanged \u2014 a gradient magnitude below 1.0 is too small to matter and should be ignored"],ans:2,explanation:"The SGD update rule is: weight = weight - learning_rate \u00d7 gradient. With gradient = -0.5 and lr = 0.01: weight = weight - 0.01 \u00d7 (-0.5) = weight + 0.005. The weight increases! A negative gradient means: \u2018if you increase this weight slightly, the loss goes down.\u2019 That\u2019s good \u2014 we want lower loss \u2014 so the optimizer nudges the weight upward. Conversely, a positive gradient means increasing the weight would increase the loss, so the optimizer decreases it."},
  {q:"A student forgets optimizer.zero_grad() in their training loop. After 3 training steps, each producing a gradient of 0.1 for a particular weight, what value does that weight\u2019s .grad hold?",opts:["0.1 \u2014 only the most recent gradient is stored, and previous ones are automatically discarded","0.3 \u2014 PyTorch accumulates gradients by adding them together across steps without zeroing them","0.0 \u2014 without explicitly calling zero_grad, gradients are never actually stored in the first place","0.033 \u2014 PyTorch automatically averages the gradients across the three training steps"],ans:1,explanation:"This is a critical gotcha. PyTorch ADDS new gradients to existing .grad values \u2014 it doesn\u2019t replace them. Without zero_grad(), the gradients accumulate: step 1 \u2192 .grad = 0.1, step 2 \u2192 .grad = 0.2, step 3 \u2192 .grad = 0.3. The optimizer then uses 0.3 instead of 0.1, making a 3\u00d7 too-large update. This leads to unstable training, oscillating loss, or divergence. Always call optimizer.zero_grad() before loss.backward() to clear the previous step\u2019s gradients."},
  {q:"Some model parameters have requires_grad=True and others have requires_grad=False. What does this mean for training?",opts:["True means the parameter is stored on GPU; False means it\u2019s stored on CPU to save memory","True means the optimizer will compute gradients for and update this parameter; False means it\u2019s frozen and won\u2019t change during training","True means the parameter holds floating point values; False means it stores integer values","True means the parameter was initialized with random values; False means it was loaded from a pretrained model file"],ans:1,explanation:"requires_grad controls whether a parameter participates in backpropagation. True = gradients will be computed, and the optimizer will update this weight each step. False = the parameter is \u2018frozen\u2019 \u2014 it keeps its current values no matter how many training steps you run. This is essential in transfer learning: you load a pretrained model, freeze the early layers (requires_grad=False) that already understand general features, and only train the new layers (requires_grad=True) you added for your specific task."},
  {q:"A student asks: \u2018Why do we compute loss first and then call loss.backward()? Why not just call model(X).backward() directly?\u2019",opts:["model(X) returns multiple values (one per sample), but backward() needs a single scalar to optimize \u2014 the loss function collapses all errors into one number","model(X).backward() works identically \u2014 the loss step is only included for code readability and convention","backward() can only be called on tensors created by loss functions like nn.MSELoss, not on model output tensors","model(X) produces outputs on GPU, and backward() only operates on CPU tensors, causing a device mismatch"],ans:0,explanation:"model(X) returns predictions with shape (batch_size, num_outputs) \u2014 many numbers. backward() on a non-scalar tensor doesn\u2019t know which direction to optimize: should it make output[0] bigger? output[1] smaller? The loss function solves this by collapsing all predictions into ONE number that measures total error. For example, MSELoss computes mean((predictions - targets)\u00b2) \u2192 a single scalar. backward() on this scalar then computes exactly how each weight should change to reduce this one error metric."},
  {q:"Why does PyTorch build a computation graph during the forward pass instead of computing gradients directly as each operation happens?",opts:["The graph is used only for visualization and debugging \u2014 gradients could be computed without it in all cases","Networks chain millions of operations together, and the graph records the exact sequence so the chain rule can walk backward through every single step automatically","The graph is needed to save the model architecture to a file \u2014 without it, the structure would be lost when Python exits","PyTorch doesn\u2019t actually build a graph \u2014 it computes gradients in real-time during the forward pass using numerical approximation"],ans:1,explanation:"Consider y = relu(x @ W1 + b1) @ W2 + b2. To compute d(loss)/dW1, you need to know every operation in the chain from W1 to loss, and apply the chain rule backward through each one. PyTorch records each operation as a node in a directed graph during the forward pass. When you call backward(), it traverses this graph from loss back to the inputs, computing gradients at each node. Without this graph, you\u2019d have to manually write out the derivative formula for every possible combination of operations \u2014 which would be impossibly tedious for real networks with millions of parameters."},
  // == Section 4 ==
  {q:"Your training loss stays perfectly flat for 500 epochs \u2014 no decrease at all. Which of these is the LEAST likely cause?",opts:["The learning rate was accidentally set to 0.0, so parameters never actually update despite gradients being computed","You forgot to call optimizer.step(), so gradients are computed but weights are never actually changed","The model has too many parameters and is overfitting to the training data, memorizing every example","You forgot loss.backward(), so all .grad values remain at zero and the optimizer has nothing to work with"],ans:2,explanation:"This is a trick question about understanding what overfitting actually means. Overfitting means the model learns TOO WELL on training data \u2014 the training loss actually decreases sharply (sometimes to near zero), while validation loss stays high. A perfectly flat loss means the model isn\u2019t learning at all. The real culprits for flat loss: learning rate = 0 (weights never move), missing optimizer.step() (computed gradients aren\u2019t applied), missing loss.backward() (gradients stay at zero), or a bug where data and labels don\u2019t correspond."},
  {q:"Training loss was decreasing nicely for 50 epochs, then suddenly jumps to NaN or infinity. What\u2019s most likely happening?",opts:["The model ran out of GPU memory and tensors overflowed into corrupted CPU memory regions, causing numerical garbage","The learning rate is too high \u2014 a large gradient caused an oversized weight update, which cascaded into exponentially growing values until overflow","The training data contains duplicate samples that confuse the optimizer\u2019s internal momentum calculations","Python\u2019s floating point precision limit was reached after accumulating 50 epochs of small rounding errors"],ans:1,explanation:"This is called \u2018gradient explosion\u2019 and it\u2019s one of the most recognizable training failures. Here\u2019s the cascade: a large gradient \u00d7 a too-high learning rate \u2192 a massive weight update \u2192 even larger outputs on the next forward pass \u2192 even larger loss \u2192 even larger gradients \u2192 even more massive updates \u2192 values exceed float32 range \u2192 NaN. The fix depends on the situation: reduce the learning rate, use gradient clipping (cap gradient magnitudes), or switch to an adaptive optimizer like Adam that automatically scales the learning rate per-parameter."},
  {q:"What happens if you accidentally call optimizer.step() BEFORE loss.backward() in the training loop?",opts:["Training works the same \u2014 the order of step and backward doesn\u2019t matter as long as both are called each iteration","optimizer.step() uses whatever gradients currently exist in .grad (from the PREVIOUS step, or zeros on step 1), so the model updates based on stale or empty information","PyTorch raises an immediate error because step() checks whether backward() has been called and refuses to proceed","The model trains twice as fast because the parameter update and gradient computation happen simultaneously"],ans:1,explanation:"optimizer.step() doesn\u2019t know or care whether backward() has been called \u2014 it simply reads the current .grad values and applies the update rule (e.g., weight -= lr \u00d7 grad). If backward() hasn\u2019t run yet this iteration, .grad still holds gradients from the previous step (or zeros if zero_grad was just called). So the model updates using wrong gradient information. This doesn\u2019t crash \u2014 it silently does the wrong thing, which can be very hard to debug. The correct order is always: forward \u2192 loss \u2192 zero_grad \u2192 backward \u2192 step."},
  {q:"What does the loss variable actually hold \u2014 a plain Python number or something more?",opts:["A plain Python float like 0.034, identical to what you\u2019d get from calling float(loss) or loss.item()","A PyTorch tensor that\u2019s connected to the entire computation graph \u2014 it knows how every weight contributed to its value, which is why .backward() can compute gradients","A special Loss object that\u2019s separate from regular tensors, with its own unique methods and properties","A dictionary that maps each parameter name to how much that parameter individually contributed to the total error"],ans:1,explanation:"loss is a PyTorch scalar tensor (a tensor containing one number) that\u2019s connected to the computation graph. It \u2018remembers\u2019 every operation that produced it: data \u2192 model weights \u2192 predictions \u2192 loss function \u2192 this number. That\u2019s why loss.backward() works \u2014 it walks backward through all those recorded operations. loss.item() extracts just the plain float (e.g., 0.034) for printing or logging. Critical mistake: if you accidentally write loss = loss.item() in your training loop, you disconnect from the graph and loss.backward() will crash."},
  {q:"A student stores training losses with losses.append(loss) and after 5000 epochs, their program crashes with an out-of-memory error. What went wrong?",opts:["The losses list grew too large for Python to handle because 5000 floating point numbers exceed available RAM","Each loss is a tensor connected to its computation graph \u2014 storing 5000 of them keeps 5000 full computation graphs alive in memory, growing without bound","The model\u2019s parameters grew too large during training because the optimizer kept adding to their values","PyTorch has a hard limit of 1000 stored tensors, and exceeding it causes an automatic memory cleanup failure"],ans:1,explanation:"loss isn\u2019t just a number \u2014 it\u2019s a tensor attached to the entire computation graph for that training step (every intermediate value, every weight contribution). When you append loss to a list, Python keeps a reference to it, preventing garbage collection of that graph. After 5000 steps, you have 5000 complete computation graphs in memory. The fix is simple: losses.append(loss.item()) extracts just the float number and lets each graph be freed. This is one of the most common memory leaks in PyTorch training code."},
  // == Section 5 ==
  {q:"A student stacks 5 nn.Linear layers with no activation functions between them and says: \u2018more layers means more powerful.\u2019 What\u2019s wrong with this reasoning?",opts:["5 layers is always too many for any problem \u2014 research shows the optimal number is always 2 or 3 layers maximum","Without activation functions between them, all 5 linear layers mathematically collapse into a single linear transformation \u2014 adding layers adds parameters but zero new learning capacity","The model will be far too slow to train because each additional layer doubles the total computation time required","The linear layers will cancel each other out through negative interference, always producing a zero output regardless of input"],ans:1,explanation:"Here\u2019s the math: if layer 1 does f(x) = W1\u00b7x + b1 and layer 2 does g(x) = W2\u00b7x + b2, then stacking them gives g(f(x)) = W2\u00b7(W1\u00b7x + b1) + b2 = (W2\u00b7W1)\u00b7x + (W2\u00b7b1 + b2). That simplifies to A\u00b7x + B \u2014 still a single linear transformation! You could replace all 5 layers with one nn.Linear and get identical results with fewer parameters. Activation functions like ReLU between layers break this linearity, enabling the network to model curves, thresholds, and complex nonlinear patterns that a single linear layer never could."},
  {q:"ReLU is defined as max(0, x) \u2014 a trivially simple function. How can it possibly enable learning complex patterns like image recognition?",opts:["It can\u2019t on its own \u2014 ReLU is a placeholder for simple problems, and real applications require sophisticated activation functions like GELU or Swish","Combining many ReLU neurons across multiple layers creates piecewise linear approximations that can model arbitrarily complex curves \u2014 like building any smooth shape from enough small straight line segments","ReLU\u2019s simplicity means each neuron computes extremely fast, so the network compensates by having millions more neurons than it would otherwise need","ReLU works because negative values in neural network computations always represent noise that should be removed from the signal"],ans:1,explanation:"Each ReLU neuron creates a \u2018hinge point\u2019 \u2014 a location where the output switches from zero to linear. One neuron = one hinge = one straight segment. But combine hundreds of neurons across multiple layers, and these hinges tile together into complex piecewise linear functions that can approximate ANY continuous curve to arbitrary precision. It\u2019s like drawing a smooth circle using only tiny straight line segments \u2014 enough segments and you can\u2019t tell the difference. ReLU\u2019s simplicity is actually an advantage: it\u2019s fast to compute (just a comparison), has a clean gradient (0 or 1), and avoids the \u2018vanishing gradient\u2019 problem that slows training with sigmoid/tanh."},
  {q:"You trained a model with Dropout layers but forgot to call model.eval() before running inference (predictions on new data). What goes wrong?",opts:["Nothing noticeable \u2014 Dropout behaves identically whether the model is in training mode or evaluation mode","Dropout randomly zeros out some neurons during inference, making predictions noisy and inconsistent \u2014 feed the same input twice and you could get different outputs each time","The model crashes with an error because Dropout can\u2019t generate random numbers without the training data seed","Dropout doubles all neuron outputs during inference, making every prediction exactly 2\u00d7 larger than it should be"],ans:1,explanation:"During training, Dropout randomly sets some neuron outputs to zero (e.g., 50% of them) to prevent overfitting \u2014 it forces the network to not rely too heavily on any single neuron. During inference, you want ALL neurons active to get the best possible prediction. model.eval() switches Dropout off (and adjusts BatchNorm). Without calling model.eval(), Dropout keeps randomly zeroing neurons during prediction, so: (1) predictions are worse on average, and (2) they\u2019re non-deterministic \u2014 the same input can produce different outputs depending on which neurons randomly get dropped."},
  {q:"You\u2019re building two models: one predicts house prices (any positive number), another classifies emails into spam or not-spam. How should their final output layers differ?",opts:["Both should use nn.Linear followed by a ReLU activation \u2014 ReLU handles both continuous and categorical outputs correctly","House prices: nn.Linear(hidden, 1) with no activation (raw unbounded number). Spam: nn.Linear(hidden, 2) paired with CrossEntropyLoss (which handles softmax internally).","House prices: nn.Softmax to output a continuous value. Spam: plain nn.Linear with no activation for the binary decision.","Both should use identical nn.Linear(hidden, 1) layers \u2014 the loss function automatically handles all interpretation of the output"],ans:1,explanation:"The output layer must match your task. For regression (house prices): you want a single raw number with no activation \u2014 prices aren\u2019t bounded between 0 and 1, and ReLU would block negative predictions (what if the model needs to predict below-average values?). Use nn.MSELoss. For classification (spam): you want one score per class. With 2 classes, use nn.Linear(hidden, 2) + CrossEntropyLoss \u2014 CrossEntropyLoss applies softmax internally to convert raw scores into probabilities, then computes the loss. Alternatively, 1 output + sigmoid + BCELoss."},
  {q:"When we say a neural network \u2018learns,\u2019 what is physically changing inside the model during training?",opts:["The network memorizes each training example in an internal lookup table and recalls the closest stored match during prediction","The numerical values of the weight and bias parameters are gradually adjusted through gradient descent, step by step, to produce predictions that minimize the loss","The network dynamically adds new neurons and layers whenever it encounters training examples it can\u2019t handle with its current architecture","Python generates an optimized set of if/else decision rules from the training data that the model later applies to new inputs"],ans:1,explanation:"Learning in a neural network = changing numbers. The model starts with random weights and biases \u2014 it knows nothing. Each training step: (1) makes predictions with current weights, (2) measures how wrong they are (loss), (3) computes which direction to nudge each weight to reduce the error (gradients via backward), (4) applies those nudges (optimizer.step). After thousands of these nudge cycles, the weights encode patterns from the data. Crucially, the architecture (number of layers, neurons) stays completely fixed throughout training \u2014 only the numerical parameter values change."}
];

let currentQ=0,answers=new Array(questions.length).fill(null),userName="",userGithub="";
function startQuiz(){userName=document.getElementById("userName").value.trim();userGithub=document.getElementById("userGithub").value.trim();if(!userName){alert("Please enter your name.");return;}document.getElementById("startScreen").classList.add("hidden");document.getElementById("quizScreen").classList.remove("hidden");quizActive=true;renderQuestion();}
let quizActive=false;
document.getElementById("userName").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("userGithub").focus();}});
document.getElementById("userGithub").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();startQuiz();}});
document.addEventListener("keydown",function(e){if(!quizActive)return;if(e.key==="Enter"&&answers[currentQ]!==null){e.preventDefault();if(currentQ===questions.length-1)submitQuiz();else nextQuestion();}});
function getSection(idx){for(const s of sections){if(idx>=s.range[0]&&idx<s.range[1])return s.title;}return"";}
function renderQuestion(){const q=questions[currentQ],letters=["A","B","C","D"],card=document.getElementById("questionCard");let html=`<div class="section-badge">${getSection(currentQ)}</div><h2>Q${currentQ+1}. ${q.q}</h2><div class="options">`;q.opts.forEach((opt,i)=>{const sel=answers[currentQ]===i?" selected":"";html+=`<div class="option${sel}" onclick="selectOption(${i})"><span class="letter">${letters[i]}</span><span class="text">${opt}</span></div>`;});html+=`</div>`;card.innerHTML=html;const nav=document.getElementById("qNav");let navHtml="";for(let n=0;n<questions.length;n++){let cls="q-nav-btn";if(n===currentQ)cls+=" active";else if(answers[n]!==null)cls+=" answered";navHtml+=`<button class="${cls}" onclick="jumpTo(${n})">${n+1}</button>`;}nav.innerHTML=navHtml;document.getElementById("progressLabel").textContent=`Question ${currentQ+1} of ${questions.length}`;document.getElementById("sectionLabel").textContent=getSection(currentQ);document.getElementById("progressFill").style.width=((currentQ+1)/questions.length*100)+"%";document.getElementById("prevBtn").style.visibility=currentQ===0?"hidden":"visible";const nextBtn=document.getElementById("nextBtn");if(currentQ===questions.length-1){nextBtn.textContent="Submit Quiz";nextBtn.onclick=submitQuiz;}else{nextBtn.textContent="Next";nextBtn.onclick=nextQuestion;}}
function selectOption(idx){answers[currentQ]=idx;renderQuestion();}function jumpTo(idx){currentQ=idx;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}function nextQuestion(){if(answers[currentQ]===null){alert("Please select an answer before continuing.");return;}if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo({top:0,behavior:"smooth"});}}
function submitQuiz(){if(answers[currentQ]===null){alert("Please select an answer before submitting.");return;}const unanswered=answers.findIndex(a=>a===null);if(unanswered!==-1){alert(`Please answer Question ${unanswered+1} before submitting.`);currentQ=unanswered;renderQuestion();return;}if(!confirm("Submit your quiz? You won't be able to change answers."))return;quizActive=false;const results=questions.map((q,i)=>answers[i]===q.ans);const score=results.filter(Boolean).length;sendResults(results,score);showResults(results,score);}
function sendResults(results,score){if(SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){console.warn("No Apps Script URL configured.");return;}fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({quizName:QUIZ_NAME,name:userName,github:userGithub,results:results})}).catch(err=>console.error("Failed:",err));}
function showResults(results,score){document.getElementById("quizScreen").classList.add("hidden");const container=document.getElementById("resultsScreen");container.classList.remove("hidden");const pct=Math.round((score/questions.length)*100),tier=pct>=80?"high":pct>=50?"mid":"low";const message=pct>=80?"Excellent work!":pct>=50?"Good effort \u2014 review the topics you missed.":"Keep studying \u2014 review the explanations below.";let html=`<div class="score-circle score-${tier}"><span class="number">${score}/${questions.length}</span><span class="label">${pct}%</span></div><h1>${message}</h1><p class="results-subtitle">${userName}${userGithub?" &bull; @"+userGithub:""}</p><div class="review-list">`;const letters=["A","B","C","D"];questions.forEach((q,i)=>{const correct=results[i];const cls=correct?"correct":"incorrect";const status=correct?"\u2713 Correct":"\u2717 Incorrect";html+=`<div class="review-item ${cls}"><div class="q-title">Q${i+1}. ${q.q}</div><div class="status-badge ${cls}">${status}</div><div class="your-answer"><strong>Your answer:</strong> ${letters[answers[i]]} \u2014 ${q.opts[answers[i]]}</div>`;if(!correct)html+=`<div class="correct-answer"><strong>Correct answer:</strong> ${letters[q.ans]} \u2014 ${q.opts[q.ans]}</div>`;html+=`<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div></div>`;});html+=`</div>`;container.innerHTML=html;window.scrollTo({top:0,behavior:"smooth"});}
</script>
